<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga Track — Comic & Manga Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--gold:#C9A84C;--gold-light:#E8C97A;--gold-dim:#8B6E30;--bg:#0A0A0C;--surface:#111116;--surface2:#18181F;--surface3:#1F1F28;--border:#2A2A35;--border-soft:#222230;--text:#F0EEE8;--text-muted:#8A8899;--text-dim:#55546A;--red:#E05555;--green:#5EC47A;--blue:#5B8DEF;--purple:#9B6BF0;--pink:#E86F9C;--orange:#E8A75C;--serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
  
  /* Header Styles */
  header{position:sticky;top:0;z-index:100;background:rgba(10,10,12,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-soft);padding:0 2.5rem;height:80px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-family:var(--serif);font-size:1.9rem;font-weight:300;letter-spacing:.3em;color:var(--gold);text-transform:uppercase}
  .logo span{color:var(--text-dim);font-style:italic}
  .tagline{font-family:var(--sans);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);border-left:1px solid var(--border);padding-left:1rem}
  .tagline em{color:var(--gold-light)}
  .btn{font-family:var(--sans);font-size:.8rem;font-weight:500;padding:.55rem 1.35rem;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:.2s}
  .btn:hover{border-color:var(--gold-dim);color:var(--gold)}
  .btn-primary{background:linear-gradient(115deg, var(--gold) 0%, var(--gold-dim) 100%);border-color:transparent;color:#0A0A0C}
  .btn-primary:hover{background:linear-gradient(115deg, var(--gold-light) 0%, var(--gold) 100%)}
  
  /* Stats Bar */
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border-soft)}
  .stat-item{background:var(--surface);padding:1.5rem 2.5rem;cursor:pointer;transition:.2s}
  .stat-item:hover{background:var(--surface2)}
  .stat-label{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim)}
  .stat-value{font-family:var(--serif);font-size:2.2rem;font-weight:300;color:var(--text)}
  
  /* Main Content */
  main{display:grid;grid-template-columns:260px 1fr}
  aside{background:var(--surface);border-right:1px solid var(--border-soft);padding:2rem 0;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto}
  .sidebar-section{padding:0 1.5rem;margin-bottom:2rem}
  .sidebar-title{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);border-bottom:1px solid var(--border-soft);padding-bottom:.5rem;margin-bottom:.75rem}
  .nav-item{display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;cursor:pointer;color:var(--text-muted)}
  .nav-item:hover{background:var(--surface2);color:var(--text)}
  .nav-item.active{background:rgba(201,168,76,.08);color:var(--gold);border-left:2px solid var(--gold)}
  .content{padding:2rem 2.5rem}
  .section-title{font-family:var(--serif);font-size:1.75rem;font-weight:300}
  .section-title em{color:var(--gold)}
  
  /* Search & Grid */
  .search-row{display:flex;gap:.75rem;margin:1.5rem 0}
  .search-wrap{flex:1;position:relative}
  .search-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.65rem 1rem .65rem 2.75rem;border-radius:2px}
  .search-icon{position:absolute;left:.9rem;top:50%;transform:translateY(-50%)}
  .media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1.25rem}
  .media-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:2px;overflow:hidden;cursor:pointer;transition:.2s}
  .media-card:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
  .card-poster{width:100%;aspect-ratio:2/3;object-fit:cover}
  .poster-placeholder{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:var(--surface2);font-size:3rem}
  .card-badge{position:absolute;top:.6rem;right:.6rem;font-size:.65rem;padding:.25rem .5rem;border-radius:1px;background:rgba(0,0,0,.7)}
  .card-info{padding:.75rem}
  .card-title{font-size:.85rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-meta{font-size:.72rem;color:var(--text-dim)}
  .progress-bar{height:2px;background:var(--border);margin-top:.6rem}
  .progress-fill{height:100%;background:var(--gold)}
  
  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border:1px solid var(--border);width:100%;max-width:680px;max-height:90vh;overflow-y:auto;border-radius:2px}
  .modal-header{padding:1.5rem 2rem;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between}
  .modal-body{padding:1.5rem 2rem}
  .tmdb-wrap{position:relative;margin-bottom:1.25rem}
  .tmdb-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.65rem .9rem;border-radius:2px}
  .tmdb-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-top:none;max-height:280px;overflow-y:auto;display:none;z-index:50}
  .tmdb-item{display:flex;gap:.75rem;padding:.6rem .9rem;cursor:pointer;border-bottom:1px solid var(--border-soft)}
  .tmdb-item:hover{background:var(--surface3)}
  .tmdb-thumb{width:36px;height:54px;object-fit:cover;border-radius:2px}
  .tmdb-nothumb{width:36px;height:54px;background:var(--surface3);display:flex;align-items:center;justify-content:center}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .form-group{display:flex;flex-direction:column;gap:.4rem}
  .form-group.full{grid-column:1/-1}
  label{font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim)}
  input,select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.65rem .9rem;border-radius:2px}
  .star-rating{display:flex;gap:.25rem}
  .star-btn{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text-dim)}
  .star-btn.active{color:var(--gold)}
  .toast{position:fixed;bottom:2rem;right:2rem;background:var(--surface);border:1px solid var(--gold-dim);padding:.75rem 1.25rem;border-radius:2px;z-index:500;opacity:0;transition:.3s}
  .toast.show{opacity:1}
  .empty{text-align:center;padding:4rem;color:var(--text-dim)}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:baseline;gap:1rem">
    <div class="logo">Manga<span>Track</span></div>
    <div class="tagline">track your <em>manga</em> & <em>manhwa</em> journey</div>
  </div>
  <div>
    <button class="btn btn-primary" onclick="openModal()">+ Add Manga</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item" onclick="filterStatus('all')"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">0</div></div>
  <div class="stat-item" onclick="filterStatus('reading')"><div class="stat-label">Reading</div><div class="stat-value" id="stat-reading">0</div></div>
  <div class="stat-item" onclick="filterStatus('completed')"><div class="stat-label">Completed</div><div class="stat-value" id="stat-completed">0</div></div>
  <div class="stat-item" onclick="filterStatus('plan')"><div class="stat-label">Plan to Read</div><div class="stat-value" id="stat-plan">0</div></div>
</div>

<main>
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-title">Status</div>
      <div class="nav-item active" id="nav-all" onclick="filterStatus('all')">📚 All Manga</div>
      <div class="nav-item" id="nav-reading" onclick="filterStatus('reading')">📖 Reading</div>
      <div class="nav-item" id="nav-completed" onclick="filterStatus('completed')">✅ Completed</div>
      <div class="nav-item" id="nav-plan" onclick="filterStatus('plan')">📋 Plan to Read</div>
      <div class="nav-item" id="nav-dropped" onclick="filterStatus('dropped')">⛔ Dropped</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Type</div>
      <div class="nav-item" id="nav-type-all" onclick="filterType('all')">◈ All</div>
      <div class="nav-item" id="nav-type-manga" onclick="filterType('Manga')">📘 Manga</div>
      <div class="nav-item" id="nav-type-manhwa" onclick="filterType('Manhwa')">📱 Manhwa</div>
      <div class="nav-item" id="nav-type-manhua" onclick="filterType('Manhua')">📙 Manhua</div>
      <div class="nav-item" id="nav-type-comic" onclick="filterType('Comic')">🇺🇸 Comic</div>
    </div>
  </aside>

  <div class="content">
    <div class="section-title" id="section-title">My <em>Manga Collection</em></div>
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Search manga, manhwa, author..." id="search-input" oninput="renderMedia()">
      </div>
      <select id="sort-select" onchange="renderMedia()" style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.65rem">
        <option value="added">Recently Added</option>
        <option value="rating">Highest Rated</option>
        <option value="title">A → Z</option>
      </select>
    </div>
    <div id="media-container"></div>
  </div>
</main>

<!-- Modal Add/Edit Manga -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="section-title" style="font-size:1.3rem" id="modal-heading">Add New Manga</div>
      <button class="btn" onclick="closeModal()" style="padding:.3rem .8rem">✕</button>
    </div>
    <div class="modal-body">
      <!-- AniList Search -->
      <div style="margin-bottom:1.25rem">
        <label>Cari dari AniList (gambar otomatis)</label>
        <div class="tmdb-wrap">
          <div class="tmdb-row">
            <input class="tmdb-input" id="anilist-search" type="text" placeholder="Ketik judul manga/manhwa..." oninput="onAnilistSearch(this.value)" autocomplete="off">
            <button class="btn" onclick="clearAnilist()">✕</button>
          </div>
          <div class="tmdb-dropdown" id="anilist-dd"></div>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group full">
          <label>Title</label>
          <input type="text" id="f-title" placeholder="Manga title...">
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="f-type">
            <option value="Manga">📘 Manga (Japanese)</option>
            <option value="Manhwa">📱 Manhwa (Korean)</option>
            <option value="Manhua">📙 Manhua (Chinese)</option>
            <option value="Comic">🇺🇸 Comic (Western)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Year</label>
          <input type="number" id="f-year" placeholder="2024">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="f-status">
            <option value="plan">📋 Plan to Read</option>
            <option value="reading">📖 Reading</option>
            <option value="completed">✅ Completed</option>
            <option value="dropped">⛔ Dropped</option>
          </select>
        </div>
        <div class="form-group">
          <label>Author / Artist</label>
          <input type="text" id="f-author" placeholder="Author name">
        </div>
        <div class="form-group">
          <label>Genres</label>
          <input type="text" id="f-genre" placeholder="Action, Fantasy, Romance...">
        </div>
        <div class="form-group">
          <label>Total Chapters</label>
          <input type="number" id="f-chapters" placeholder="Total chapters" min="0">
        </div>
        <div class="form-group">
          <label>Current Chapter</label>
          <input type="number" id="f-current-chapter" placeholder="Current chapter" min="0">
        </div>
        <div class="form-group">
          <label>Total Volumes</label>
          <input type="text" id="f-volumes" placeholder="Optional">
        </div>
        <div class="form-group">
          <label>Rating</label>
          <div class="star-rating" id="star-rating">
            <button class="star-btn" data-v="1" onclick="setRating(1)">★</button>
            <button class="star-btn" data-v="2" onclick="setRating(2)">★</button>
            <button class="star-btn" data-v="3" onclick="setRating(3)">★</button>
            <button class="star-btn" data-v="4" onclick="setRating(4)">★</button>
            <button class="star-btn" data-v="5" onclick="setRating(5)">★</button>
          </div>
        </div>
        <div class="form-group full">
          <label>Notes</label>
          <textarea id="f-notes" rows="2" placeholder="Personal thoughts..."></textarea>
        </div>
      </div>
      
      <input type="hidden" id="f-cover" value="">
      <input type="hidden" id="f-anilist-id" value="">

      <div style="display:flex;justify-content:flex-end;gap:.75rem;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border-soft)">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="btn-save" onclick="saveEntry()">Save Manga</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== ANILIST API CONFIG ====================
const ANILIST_API = 'https://graphql.anilist.co';

// ==================== DATA STORAGE ====================
let mediaData = [];
let currentRating = 0;
let editingId = null;
let filterSt = 'all';
let filterTy = 'all';
let viewMode = 'grid';
let anilistTimer = null;

// Load dari localStorage (untuk demo, nanti bisa connect ke Google Sheets)
function loadFromStorage() {
  const saved = localStorage.getItem('mangaTracker');
  if (saved) {
    mediaData = JSON.parse(saved);
  } else {
    // Sample data
    mediaData = [
      { id: 1, title: "One Piece", type: "Manga", year: 1997, status: "reading", genre: "Action, Adventure, Fantasy", author: "Eiichiro Oda", chapters: 1088, currentChapter: 1050, volumes: "105", rating: 5, notes: "Peak fiction!", cover: "", added: Date.now() - 86400000 },
      { id: 2, title: "Solo Leveling", type: "Manhwa", year: 2018, status: "completed", genre: "Action, Fantasy", author: "Chugong", chapters: 179, currentChapter: 179, volumes: "14", rating: 5, notes: "Best manhwa ever!", cover: "", added: Date.now() }
    ];
  }
  renderMedia();
}

function saveToStorage() {
  localStorage.setItem('mangaTracker', JSON.stringify(mediaData));
}

// ==================== ANILIST SEARCH FUNCTION ====================
async function searchAnilist(query) {
  const searchQuery = `
    query ($search: String) {
      Media (search: $search, type: MANGA) {
        id
        title {
          romaji
          english
          native
        }
        coverImage {
          large
          extraLarge
        }
        startDate {
          year
        }
        chapters
        volumes
        genres
        status
        description(asHtml: false)
        staff {
          edges {
            node {
              name {
                full
              }
              primaryOccupations
            }
          }
        }
      }
    }
  `;
  
  try {
    const response = await fetch(ANILIST_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        query: searchQuery, 
        variables: { search: query } 
      })
    });
    const data = await response.json();
    return data.data?.Media || null;
  } catch (err) {
    console.error('AniList error:', err);
    return null;
  }
}

function onAnilistSearch(value) {
  clearTimeout(anilistTimer);
  if (value.length < 2) {
    document.getElementById('anilist-dd').style.display = 'none';
    return;
  }
  anilistTimer = setTimeout(async () => {
    const manga = await searchAnilist(value);
    const dd = document.getElementById('anilist-dd');
    
    if (!manga) {
      dd.style.display = 'none';
      return;
    }
    
    // Get author name from staff data
    let author = '';
    if (manga.staff?.edges) {
      const authorEdge = manga.staff.edges.find(edge => 
        edge.node.primaryOccupations?.some(occ => occ.includes('Author') || occ.includes('Writer') || occ.includes('Story'))
      );
      if (authorEdge) author = authorEdge.node.name.full;
    }
    
    dd.innerHTML = `
      <div class="tmdb-item" onclick="selectAnilistManga(this)" 
           data-id="${manga.id}"
           data-title="${manga.title.romaji || manga.title.english || manga.title.native}"
           data-cover="${manga.coverImage.large}"
           data-year="${manga.startDate?.year || ''}"
           data-chapters="${manga.chapters || '?'}"
           data-volumes="${manga.volumes || '?'}"
           data-genres="${(manga.genres || []).slice(0,3).join(', ')}"
           data-author="${author}">
        ${manga.coverImage.large ? `<img class="tmdb-thumb" src="${manga.coverImage.large}" loading="lazy">` : `<div class="tmdb-nothumb">${(manga.title.romaji || '?').charAt(0)}</div>`}
        <div>
          <div class="tmdb-name">${manga.title.romaji || manga.title.english}</div>
          <div class="tmdb-sub">${manga.genres?.slice(0,3).join(', ') || ''} · ${manga.chapters || '?'} chapters · ${manga.startDate?.year || ''}</div>
          ${author ? `<div class="tmdb-sub">✍️ ${author}</div>` : ''}
        </div>
      </div>
    `;
    dd.style.display = 'block';
  }, 400);
}

function selectAnilistManga(el) {
  const title = el.dataset.title;
  const cover = el.dataset.cover;
  const year = el.dataset.year;
  const chapters = el.dataset.chapters;
  const volumes = el.dataset.volumes;
  const genres = el.dataset.genres;
  const author = el.dataset.author;
  const anilistId = el.dataset.id;
  
  document.getElementById('f-title').value = title;
  document.getElementById('f-year').value = year;
  document.getElementById('f-chapters').value = chapters !== '?' ? chapters : '';
  document.getElementById('f-volumes').value = volumes !== '?' ? volumes : '';
  document.getElementById('f-genre').value = genres;
  document.getElementById('f-author').value = author;
  document.getElementById('f-cover').value = cover;
  document.getElementById('f-anilist-id').value = anilistId;
  document.getElementById('anilist-search').value = title;
  
  updateCoverPreview(cover, title);
  document.getElementById('anilist-dd').style.display = 'none';
}

function updateCoverPreview(url, title) {
  const box = document.getElementById('poster-box');
  const letter = (title || '?').charAt(0).toUpperCase();
  if (url && url !== 'null') {
    box.innerHTML = `<img class="poster-ph" style="width:90px;height:135px;object-fit:cover;border-radius:2px" src="${url}" onerror="this.outerHTML='<div class=poster-ph style=display:flex;align-items:center;justify-content:center>${letter}</div>';">`;
  } else {
    box.innerHTML = `<div class="poster-ph" style="width:90px;height:135px;display:flex;align-items:center;justify-content:center;background:var(--surface2)">${letter}</div>`;
  }
}

function clearAnilist() {
  document.getElementById('anilist-search').value = '';
  document.getElementById('f-cover').value = '';
  document.getElementById('f-anilist-id').value = '';
  document.getElementById('anilist-dd').style.display = 'none';
  updateCoverPreview('', document.getElementById('f-title').value);
}

// Add poster box to modal
const posterBoxHtml = `<div class="poster-box" id="poster-box" style="margin-right:1rem"><div class="poster-ph" style="width:90px;height:135px;display:flex;align-items:center;justify-content:center;background:var(--surface2)">?</div></div>`;
const addLayoutDiv = document.querySelector('.add-layout');
if (!addLayoutDiv) {
  const modalBody = document.querySelector('.modal-body .form-grid');
  if (modalBody) {
    modalBody.insertAdjacentHTML('beforebegin', `<div class="add-layout" style="display:flex;gap:1rem;margin-bottom:1rem">${posterBoxHtml}<div style="flex:1"></div></div>`);
  }
}

// ==================== CORE FUNCTIONS ====================
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function saveEntry() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) {
    showToast('Please enter a title', true);
    return;
  }
  
  const entry = {
    id: editingId || Date.now(),
    title: title,
    type: document.getElementById('f-type').value,
    year: parseInt(document.getElementById('f-year').value) || new Date().getFullYear(),
    status: document.getElementById('f-status').value,
    genre: document.getElementById('f-genre').value || '',
    author: document.getElementById('f-author').value || '',
    chapters: parseInt(document.getElementById('f-chapters').value) || 0,
    currentChapter: parseInt(document.getElementById('f-current-chapter').value) || 0,
    volumes: document.getElementById('f-volumes').value || '',
    rating: currentRating,
    notes: document.getElementById('f-notes').value || '',
    cover: document.getElementById('f-cover').value || '',
    anilistId: document.getElementById('f-anilist-id').value || '',
    added: editingId ? (mediaData.find(x => x.id === editingId)?.added || Date.now()) : Date.now()
  };
  
  if (editingId) {
    const idx = mediaData.findIndex(x => x.id === editingId);
    if (idx > -1) mediaData[idx] = entry;
  } else {
    mediaData.push(entry);
  }
  
  saveToStorage();
  renderMedia();
  closeModal();
  showToast(editingId ? 'Updated!' : 'Saved!');
}

function getFiltered() {
  let data = [...mediaData];
  
  if (filterSt !== 'all') data = data.filter(x => x.status === filterSt);
  if (filterTy !== 'all') data = data.filter(x => x.type === filterTy);
  
  const q = document.getElementById('search-input').value.toLowerCase();
  if (q) {
    data = data.filter(x => 
      x.title.toLowerCase().includes(q) || 
      (x.author && x.author.toLowerCase().includes(q)) ||
      (x.genre && x.genre.toLowerCase().includes(q))
    );
  }
  
  const sort = document.getElementById('sort-select').value;
  if (sort === 'rating') data.sort((a, b) => b.rating - a.rating);
  else if (sort === 'title') data.sort((a, b) => a.title.localeCompare(b.title));
  else data.sort((a, b) => b.added - a.added);
  
  return data;
}

function renderMedia() {
  updateStats();
  
  const data = getFiltered();
  const container = document.getElementById('media-container');
  
  if (!data.length) {
    container.innerHTML = '<div class="empty">📭 No manga found<br><small>Add your first manga using the + button</small></div>';
    return;
  }
  
  container.innerHTML = `<div class="media-grid">${data.map(m => cardHTML(m)).join('')}</div>`;
}

function cardHTML(m) {
  const letter = m.title.charAt(0).toUpperCase();
  const progress = m.chapters ? Math.round((m.currentChapter / m.chapters) * 100) : 0;
  const typeIcons = { Manga: '📘', Manhwa: '📱', Manhua: '📙', Comic: '🇺🇸' };
  const statusIcons = { reading: '📖', completed: '✅', plan: '📋', dropped: '⛔' };
  
  return `
    <div class="media-card" onclick="showDetail(${m.id})">
      ${m.cover ? `<img class="card-poster" src="${m.cover}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">` : ''}
      <div class="poster-placeholder" style="${m.cover ? 'display:none' : 'display:flex'}">${letter}</div>
      <div class="card-badge">${statusIcons[m.status] || '📚'}</div>
      <div class="card-info">
        <div class="card-title">${m.title}</div>
        <div class="card-meta">${typeIcons[m.type] || '📘'} ${m.type} · ${m.year || '?'}</div>
        <div class="card-meta">📖 Ch ${m.currentChapter || 0}/${m.chapters || '?'}</div>
        ${m.rating ? `<div class="star-row">${renderStars(m.rating)}</div>` : ''}
        ${progress > 0 && progress < 100 ? `<div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>` : ''}
      </div>
    </div>
  `;
}

function renderStars(rating) {
  return [1,2,3,4,5].map(i => `<span style="color:${i <= rating ? 'var(--gold)' : 'var(--text-dim)'}">★</span>`).join('');
}

function updateStats() {
  document.getElementById('stat-total').textContent = mediaData.length;
  document.getElementById('stat-reading').textContent = mediaData.filter(x => x.status === 'reading').length;
  document.getElementById('stat-completed').textContent = mediaData.filter(x => x.status === 'completed').length;
  document.getElementById('stat-plan').textContent = mediaData.filter(x => x.status === 'plan').length;
}

function filterStatus(status) {
  filterSt = status;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + status)?.classList.add('active');
  if (status === 'all') document.getElementById('nav-all')?.classList.add('active');
  renderMedia();
}

function filterType(type) {
  filterTy = type;
  document.querySelectorAll('[id^="nav-type-"]').forEach(el => el.classList.remove('active'));
  if (type === 'all') document.getElementById('nav-type-all')?.classList.add('active');
  else document.getElementById('nav-type-' + type.toLowerCase())?.classList.add('active');
  renderMedia();
}

function openModal(id) {
  editingId = id || null;
  const m = id ? mediaData.find(x => x.id === id) : null;
  
  document.getElementById('modal-heading').textContent = m ? 'Edit Manga' : 'Add New Manga';
  document.getElementById('f-title').value = m ? m.title : '';
  document.getElementById('f-type').value = m ? m.type : 'Manga';
  document.getElementById('f-year').value = m ? m.year : '';
  document.getElementById('f-status').value = m ? m.status : 'plan';
  document.getElementById('f-genre').value = m ? m.genre : '';
  document.getElementById('f-author').value = m ? m.author : '';
  document.getElementById('f-chapters').value = m ? m.chapters : '';
  document.getElementById('f-current-chapter').value = m ? m.currentChapter : '';
  document.getElementById('f-volumes').value = m ? m.volumes : '';
  document.getElementById('f-notes').value = m ? m.notes : '';
  document.getElementById('f-cover').value = m ? m.cover : '';
  document.getElementById('f-anilist-id').value = m ? m.anilistId : '';
  
  setRating(m ? m.rating : 0);
  updateCoverPreview(m ? m.cover : '', m ? m.title : '');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function setRating(v) {
  currentRating = v;
  document.querySelectorAll('.star-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.v) <= v));
}

function showDetail(id) {
  const m = mediaData.find(x => x.id === id);
  if (!m) return;
  alert(`📖 ${m.title}\n\nStatus: ${m.status}\nAuthor: ${m.author || '-'}\nProgress: ${m.currentChapter || 0}/${m.chapters || '?'} chapters\nRating: ${m.rating}/5\n\nNotes: ${m.notes || '-'}`);
}

// Close dropdown on click outside
document.addEventListener('click', e => {
  if (!e.target.closest('.tmdb-wrap')) {
    document.getElementById('anilist-dd').style.display = 'none';
  }
});

// Initialize
loadFromStorage();
</script>
</body>
</html>
