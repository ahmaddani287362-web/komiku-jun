<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Manga Track — Comic & Manga Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--gold:#C9A84C;--gold-light:#E8C97A;--gold-dim:#8B6E30;--bg:#0A0A0C;--surface:#111116;--surface2:#18181F;--surface3:#1F1F28;--border:#2A2A35;--border-soft:#222230;--text:#F0EEE8;--text-muted:#8A8899;--text-dim:#55546A;--red:#E05555;--green:#5EC47A;--blue:#5B8DEF;--purple:#9B6BF0;--pink:#E86F9C;--orange:#E8A75C;--serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
  .sync-bar{background:var(--surface);border-bottom:1px solid var(--border-soft);padding:.4rem 2rem;display:flex;align-items:center;gap:.6rem;font-size:.75rem;color:var(--text-dim)}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);flex-shrink:0}
  .sync-dot.online{background:var(--green)}.sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite}.sync-dot.error{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  
  header{position:sticky;top:0;z-index:100;background:rgba(10,10,12,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-soft);padding:0 2rem;height:70px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
  .logo{font-family:var(--serif);font-size:1.6rem;font-weight:300;letter-spacing:.2em;color:var(--gold);text-transform:uppercase}
  .logo span{color:var(--text-dim);font-style:italic}
  .tagline{font-family:var(--sans);font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);border-left:1px solid var(--border);padding-left:1rem;margin-left:.5rem}
  .btn{font-family:var(--sans);font-size:.75rem;font-weight:500;padding:.45rem 1rem;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:.2s}
  .btn:hover{border-color:var(--gold-dim);color:var(--gold)}
  .btn-primary{background:linear-gradient(115deg, var(--gold) 0%, var(--gold-dim) 100%);border-color:transparent;color:#0A0A0C}
  .header-actions{display:flex;gap:.5rem;flex-wrap:wrap}
  
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border-soft)}
  .stat-item{background:var(--surface);padding:1rem 1.5rem;cursor:pointer;transition:.2s;text-align:center}
  .stat-item:hover{background:var(--surface2)}
  .stat-label{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)}
  .stat-value{font-family:var(--serif);font-size:1.6rem;font-weight:300;color:var(--text)}
  .stat-badge{font-size:.6rem;padding:.15rem .5rem;border-radius:12px;margin-top:.2rem;display:inline-block}
  .stat-badge.all{background:var(--text-dim);color:var(--bg)}
  .stat-badge.reading{background:var(--blue);color:white}
  .stat-badge.completed{background:var(--green);color:white}
  .stat-badge.plan{background:var(--purple);color:white}
  
  main{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 115px)}
  aside{background:var(--surface);border-right:1px solid var(--border-soft);padding:1.5rem 0;position:sticky;top:70px;height:calc(100vh - 70px);overflow-y:auto}
  .sidebar-section{padding:0 1.2rem;margin-bottom:1.5rem}
  .sidebar-title{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);border-bottom:1px solid var(--border-soft);padding-bottom:.4rem;margin-bottom:.6rem}
  .nav-item{display:flex;align-items:center;gap:.6rem;padding:.5rem .6rem;cursor:pointer;color:var(--text-muted);font-size:.8rem;border-radius:4px;margin-bottom:.1rem}
  .nav-item:hover{background:var(--surface2);color:var(--text)}
  .nav-item.active{background:rgba(201,168,76,.08);color:var(--gold);border-left:2px solid var(--gold)}
  .nav-count{margin-left:auto;font-size:.65rem;background:var(--surface2);padding:.1rem .4rem;border-radius:20px}
  .genre-cloud{display:flex;flex-wrap:wrap;gap:.4rem}
  .genre-tag{font-size:.65rem;padding:.2rem .5rem;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer}
  .genre-tag:hover,.genre-tag.active{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold)}
  
  .content{padding:1.5rem;background:var(--bg)}
  .content-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
  .section-title{font-family:var(--serif);font-size:1.3rem;font-weight:300}
  .section-title em{color:var(--gold)}
  .view-controls{display:flex;gap:.3rem}
  .view-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;border-radius:4px}
  .view-btn.active{border-color:var(--gold);color:var(--gold)}
  
  .search-row{display:flex;gap:.5rem;margin-bottom:1rem}
  .search-wrap{flex:1;position:relative}
  .search-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.5rem 1rem .5rem 2rem;border-radius:6px;font-size:.8rem}
  .search-icon{position:absolute;left:.6rem;top:50%;transform:translateY(-50%)}
  select.filter-select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.5rem;border-radius:6px;font-size:.75rem}
  
  .media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem}
  .media-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:8px;overflow:hidden;cursor:pointer;transition:.2s;position:relative}
  .media-card:hover{transform:translateY(-2px);border-color:var(--gold-dim)}
  .card-poster{width:100%;aspect-ratio:2/3;object-fit:cover}
  .poster-placeholder{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:var(--surface2);font-size:2rem}
  .status-badge{position:absolute;top:.4rem;right:.4rem;font-size:.6rem;padding:.2rem .5rem;border-radius:20px;font-weight:500}
  .status-badge.reading{background:var(--blue)}
  .status-badge.completed{background:var(--green)}
  .status-badge.plan{background:var(--purple)}
  .status-badge.dropped{background:var(--red)}
  .card-info{padding:.6rem}
  .card-title{font-size:.75rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-meta{font-size:.65rem;color:var(--text-dim)}
  .star-row{display:flex;gap:.1rem;margin-top:.3rem}
  .star{font-size:.6rem;color:var(--text-dim)}.star.filled{color:var(--gold)}
  .progress-bar{height:2px;background:var(--border);margin-top:.4rem;border-radius:2px}
  .progress-fill{height:100%;background:var(--gold);border-radius:2px}
  
  .media-list{display:flex;flex-direction:column;gap:.5rem}
  .list-item{background:var(--surface);border:1px solid var(--border-soft);border-radius:8px;display:grid;grid-template-columns:48px 1fr auto;gap:.8rem;align-items:center;padding:.6rem;cursor:pointer}
  .list-thumb{width:48px;height:72px;background:var(--surface2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
  .list-thumb img{width:100%;height:100%;object-fit:cover;border-radius:4px}
  .list-title{font-size:.8rem;font-weight:500}
  .list-detail{font-size:.65rem;color:var(--text-dim)}
  
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:.2s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:550px;max-height:85vh;overflow-y:auto}
  .modal-header{padding:1rem;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:center}
  .modal-title{font-family:var(--serif);font-size:1.2rem;font-weight:300}
  .modal-body{padding:1rem}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
  .form-group{display:flex;flex-direction:column;gap:.3rem}
  .form-group.full{grid-column:1/-1}
  label{font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim)}
  input,select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.5rem;border-radius:6px;font-size:.8rem}
  .star-rating{display:flex;gap:.2rem}
  .star-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-dim)}
  .star-btn.active{color:var(--gold)}
  .modal-footer{display:flex;justify-content:flex-end;gap:.5rem;margin-top:1rem;padding-top:.8rem;border-top:1px solid var(--border-soft)}
  .tmdb-wrap{position:relative}
  .tmdb-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.5rem;border-radius:6px;font-size:.8rem}
  .tmdb-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--border);max-height:200px;overflow-y:auto;display:none;z-index:50;border-radius:6px}
  .tmdb-item{display:flex;gap:.6rem;padding:.5rem;cursor:pointer;border-bottom:1px solid var(--border-soft)}
  .tmdb-item:hover{background:var(--surface3)}
  
  .detail-poster{width:80px;height:120px;object-fit:cover;border-radius:6px}
  .detail-row{display:flex;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--border-soft)}
  .chapter-control{display:flex;gap:.5rem;align-items:center;margin-top:.5rem}
  .chapter-input{width:80px;background:var(--surface2);border:1px solid var(--border);color:var(--gold);padding:.4rem;border-radius:6px;text-align:center}
  .update-chapter-btn{padding:.4rem .8rem;background:var(--gold);color:#0A0A0C;border:none;border-radius:6px;cursor:pointer;font-size:.7rem}
  .toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--gold);padding:.5rem 1rem;border-radius:20px;font-size:.75rem;z-index:500;opacity:0;transition:.2s}
  .toast.show{opacity:1}
  .empty{text-align:center;padding:2rem;color:var(--text-dim)}
  
  .fab-container{position:fixed;bottom:1.5rem;right:1.5rem;display:flex;flex-direction:column;gap:.6rem;z-index:150}
  .fab{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:.2s}
  .fab-add{background:var(--gold);color:#0A0A0C;font-size:1.6rem;border:none}
  .fab-filter{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font-size:1.2rem}
  .fab:active{transform:scale(.95)}
  @media(min-width:901px){.fab-container{display:none}}
  @media(max-width:900px){main{grid-template-columns:1fr}aside{display:none}.stats-bar .stat-value{font-size:1.3rem}.stat-item{padding:.6rem .8rem}.tagline{display:none}header{padding:0 1rem;height:auto;padding:.5rem 1rem}.header-actions{width:100%;justify-content:space-between}}
</style>
</head>
<body>

<div class="sync-bar">
  <span class="sync-dot" id="sync-dot"></span>
  <span id="sync-status">Ready</span>
</div>

<header>
  <div style="display:flex;align-items:baseline;flex-wrap:wrap">
    <div class="logo">Manga<span>Track</span></div>

  </div>
  <div class="header-actions">

<div class="stats-bar">

  <div class="stat-item" onclick="filterStatus('reading')"><div class="stat-label">Reading</div><div class="stat-value" id="stat-reading">0</div><span class="stat-badge reading">📖</span></div>
  <div class="stat-item" onclick="filterStatus('completed')"><div class="stat-label">Completed</div><div class="stat-value" id="stat-completed">0</div><span class="stat-badge completed">✅</span></div>
  <div class="stat-item" onclick="filterStatus('plan')"><div class="stat-label">Plan</div><div class="stat-value" id="stat-plan">0</div><span class="stat-badge plan">📋</span></div>
</div>

<main>
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-title">STATUS</div>
      <div class="nav-item active" id="nav-all" onclick="filterStatus('all')"><span>📚</span>All Titles<span class="nav-count" id="cnt-all">0</span></div>

    <div class="modal-body" id="detail-body"></div>

<div class="toast" id="toast"></div>

<script>
// ==================== KONFIGURASI ====================
const WORKER_URL = 'https://manga-proxy.ahmaddani287362.workers.dev';
const JIKAN_API = 'https://api.jikan.moe/v4/manga?q=';

let mediaData = [];
let currentRating = 0;
let editingId = null;
let currentFilterStatus = 'all';
let currentFilterType = 'all';
let currentFilterGenre = 'all';
let currentViewMode = 'grid';
let jikanTimer = null;

// ==================== FUNGSI SYNC KE GOOGLE SHEETS ====================
async function loadFromSheets() {
  const syncDot = document.getElementById('sync-dot');
  const syncStatus = document.getElementById('sync-status');
  
  syncDot.className = 'sync-dot syncing';
  syncStatus.textContent = 'Loading from Google Sheets...';
  
  try {
    const response = await fetch(WORKER_URL);
    const data = await response.json();
    
    if (data.error) throw new Error(data.error);
    
    mediaData = (data.manga || []).map(m => ({
      id: Number(m.id), 
      title: m.title || '', 
      type: m.type || 'Manga', 
      year: Number(m.year) || 0,
      status: m.status || 'plan',
      genre: m.genre || '', 
      author: m.author || '', 
      chapters: Number(m.chapters) || 0, 
      currentChapter: Number(m.currentChapter) || 0,
      volumes: m.volumes || '', 
      rating: Number(m.rating) || 0, 
      notes: m.notes || '', 
      added: Number(m.added) || Date.now(),
      cover: m.cover || '', 
      malId: m.malId || m.tmdbid || ''
    }));
    
    saveToStorage();
    
    syncDot.className = 'sync-dot online';
    syncStatus.textContent = 'Synced with Google Sheets';
    renderMedia();
    showToast('Data loaded from Google Sheets!');
    
    setTimeout(() => {
      if (syncStatus.textContent === 'Synced with Google Sheets') {
        syncStatus.textContent = 'Ready';
      }
    }, 2000);
    
  } catch (err) { 
    console.error('Load error:', err);
    syncDot.className = 'sync-dot error';
    syncStatus.textContent = 'Error loading from Sheets';
    showToast('Failed to load from Google Sheets. Using local data.', true);
    loadFromStorage();
  }
}

async function saveToSheets(entry) {
  const response = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'save', manga: entry })
  });
  return await response.json();
}

async function deleteFromSheets(id) {
  const response = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'delete', id: id })
  });
  return await response.json();
}

// ==================== EXPORT & IMPORT ====================
function exportData() {
  if (mediaData.length === 0) {
    showToast('No data to export', true);
    return;
  }
  
  const exportData = {
    version: '1.0',
    exportedAt: new Date().toISOString(),
    total: mediaData.length,
    manga: mediaData
  };
  
  const jsonStr = JSON.stringify(exportData, null, 2);
  const blob = new Blob([jsonStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement('a');
  a.href = url;
  a.download = `manga-tracker-backup-${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  showToast(`Exported ${mediaData.length} manga!`);
}

function importData(file) {
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      
      let importedManga = [];
      if (imported.manga && Array.isArray(imported.manga)) {
        importedManga = imported.manga;
      } else if (Array.isArray(imported)) {
        importedManga = imported;
      } else {
        throw new Error('Invalid file format');
      }
      
      if (importedManga.length === 0) {
        showToast('No manga found in file', true);
        return;
      }
      
      if (!confirm(`Import ${importedManga.length} manga?\n\n⚠️ This will REPLACE all current data!`)) return;
      
      const syncDot = document.getElementById('sync-dot');
      const syncStatus = document.getElementById('sync-status');
      syncDot.className = 'sync-dot syncing';
      syncStatus.textContent = 'Importing...';
      
      let successCount = 0;
      let failCount = 0;
      
      for (const manga of importedManga) {
        try {
          const entry = {
            id: manga.id || Date.now() + Math.random(),
            title: manga.title || 'Untitled',
            type: manga.type || 'Manga',
            year: manga.year || new Date().getFullYear(),
            status: manga.status || 'plan',
            genre: manga.genre || '',
            author: manga.author || '',
            chapters: manga.chapters || 0,
            currentChapter: manga.currentChapter || 0,
            volumes: manga.volumes || '',
            rating: manga.rating || 0,
            notes: manga.notes || '',
            cover: manga.cover || '',
            malId: manga.malId || manga.tmdbid || '',
            added: manga.added || Date.now()
          };
          
          await saveToSheets(entry);
          successCount++;
        } catch (err) {
          console.error('Import error:', err);
          failCount++;
        }
      }
      
      await loadFromSheets();
      
      syncDot.className = 'sync-dot online';
      syncStatus.textContent = `Imported: ${successCount} success, ${failCount} failed`;
      showToast(`Imported ${successCount} manga${failCount > 0 ? ` (${failCount} failed)` : ''}`);
      
      setTimeout(() => {
        if (syncStatus.textContent.includes('Imported')) {
          syncStatus.textContent = 'Ready';
        }
      }, 3000);
      
    } catch (err) {
      console.error('Import error:', err);
      showToast('Import failed: Invalid file format', true);
    }
  };
  reader.readAsText(file);
}

function triggerImport() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => importData(e.target.files[0]);
  input.click();
}

// ==================== SEARCH DARI JIKAN API ====================
async function searchJikan(query) {
  try {
    const response = await fetch(`${JIKAN_API}${encodeURIComponent(query)}&limit=8`);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    if (!data.data || data.data.length === 0) return [];
    
    return data.data.map(manga => {
      const title = manga.title_english || manga.title || 'Unknown';
      const coverUrl = manga.images?.jpg?.large_image_url || manga.images?.jpg?.image_url || '';
      let year = manga.published?.prop?.from?.year || '';
      let author = manga.authors?.[0]?.name || '';
      let genres = manga.genres?.map(g => g.name).join(', ') || '';
      
      return {
        id: manga.mal_id,
        title: title,
        cover: coverUrl,
        year: year,
        chapters: manga.chapters || '',
        volumes: manga.volumes || '',
        genres: genres,
        author: author
      };
    });
  } catch (error) {
    console.error('Jikan API error:', error);
    showToast('Search failed: ' + error.message, true);
    return [];
  }
}

async function saveEntry() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { showToast('Please enter a title', true); return; }
  
  const entry = {
    id: editingId || Date.now(), 
    title: title, 
    type: document.getElementById('f-type').value,
    year: parseInt(document.getElementById('f-year').value) || new Date().getFullYear(),
    status: document.getElementById('f-status').value, 
    genre: document.getElementById('f-genre').value || '',
    author: document.getElementById('f-author').value || '', 
    chapters: parseInt(document.getElementById('f-chapters').value) || 0,
    currentChapter: parseInt(document.getElementById('f-current-chapter').value) || 0,
    volumes: document.getElementById('f-volumes').value || '', 
    rating: currentRating,
    notes: document.getElementById('f-notes').value || '', 
    cover: document.getElementById('f-cover').value || '',
    malId: document.getElementById('f-mal-id').value || '', 
    added: editingId ? (mediaData.find(x=>x.id===editingId)?.added || Date.now()) : Date.now()
  };
  
  const syncDot = document.getElementById('sync-dot');
  const syncStatus = document.getElementById('sync-status');
  syncDot.className = 'sync-dot syncing';
  syncStatus.textContent = 'Saving...';
  
  try {
    await saveToSheets(entry);
    
    if (editingId) { 
      const i = mediaData.findIndex(x=>x.id===editingId); 
      if (i > -1) mediaData[i] = entry; 
    } else {
      mediaData.push(entry);
    }
    saveToStorage();
    
    syncDot.className = 'sync-dot online';
    syncStatus.textContent = 'Saved!';
    renderMedia(); 
    closeModal(); 
    showToast(editingId ? 'Manga updated!' : 'Manga added!');
    
    setTimeout(() => {
      if (syncStatus.textContent === 'Saved!') syncStatus.textContent = 'Ready';
    }, 2000);
    
  } catch (err) { 
    syncDot.className = 'sync-dot error';
    syncStatus.textContent = 'Save failed';
    showToast('Save failed: ' + err.message, true);
  }
}

function getFiltered(){
  let data = [...mediaData];
  if(currentFilterStatus !== 'all') data = data.filter(x => x.status === currentFilterStatus);
  if(currentFilterType !== 'all') data = data.filter(x => x.type === currentFilterType);
  if(currentFilterGenre !== 'all') data = data.filter(x => x.genre && x.genre.toLowerCase().includes(currentFilterGenre.toLowerCase()));
  const q = document.getElementById('search-input').value.toLowerCase();
  if(q) data = data.filter(x => x.title.toLowerCase().includes(q) || (x.author && x.author.toLowerCase().includes(q)));
  const sort = document.getElementById('sort-select').value;
  if(sort === 'rating') data.sort((a,b) => b.rating - a.rating);
  else if(sort === 'title') data.sort((a,b) => a.title.localeCompare(b.title));
  else data.sort((a,b) => b.added - a.added);
  return data;
}

function renderStars(r){ return [1,2,3,4,5].map(i => `<span class="star${i<=r?' filled':''}">★</span>`).join(''); }
function getStatusClass(s){ return {reading:'reading',completed:'completed',plan:'plan',dropped:'dropped'}[s] || 'plan'; }
function getStatusIcon(s){ return {reading:'📖',completed:'✅',plan:'📋',dropped:'⛔'}[s] || '📚'; }

function escapeHtml(str) {
  if(!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if(m === '&') return '&amp;';
    if(m === '<') return '&lt;';
    if(m === '>') return '&gt;';
    return m;
  });
}

function cardHTML(m){
  const letter = m.title.charAt(0).toUpperCase();
  const progress = m.chapters ? Math.round((m.currentChapter / m.chapters) * 100) : 0;
  const typeIcon = {Manga:'📘',Manhwa:'📱',Manhua:'📙'}[m.type] || '📘';
  return `<div class="media-card" onclick="showDetail(${m.id})">
    ${m.cover ? `<img class="card-poster" src="${m.cover}" onerror="this.style.display='none';">` : ''}
    <div class="poster-placeholder" style="${m.cover ? 'display:none' : 'display:flex'}">${letter}</div>
    <div class="status-badge ${getStatusClass(m.status)}">${getStatusIcon(m.status)}</div>
    <div class="card-info">
      <div class="card-title">${escapeHtml(m.title)}</div>
      <div class="card-meta">${typeIcon} ${m.type} · ${m.year || '?'}</div>
      <div class="card-meta">📖 ${m.currentChapter}/${m.chapters || '?'}</div>
      ${m.rating ? `<div class="star-row">${renderStars(m.rating)}</div>` : ''}
      ${progress > 0 && progress < 100 ? `<div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>` : ''}
    </div>
  </div>`;
}

function listHTML(m){
  const letter = m.title.charAt(0).toUpperCase();
  const typeIcon = {Manga:'📘',Manhwa:'📱',Manhua:'📙'}[m.type] || '📘';
  return `<div class="list-item" onclick="showDetail(${m.id})">
    <div class="list-thumb">${m.cover ? `<img src="${m.cover}">` : letter}</div>
    <div><div class="list-title">${escapeHtml(m.title)}</div><div class="list-detail">${typeIcon} ${m.type} · ${m.year || '?'} · Ch ${m.currentChapter}/${m.chapters || '?'}</div></div>
    <div class="status-badge ${getStatusClass(m.status)}" style="position:static;padding:.2rem .5rem">${getStatusIcon(m.status)}</div>
  </div>`;
}

  updateStats(); 
  updateGenreCloud(); 
  updateActiveFilters();
  const data = getFiltered();
  const c = document.getElementById('media-container');
  if(!data.length){ 
    c.innerHTML = '<div class="empty">📭 No manga found<br><small>Add your first manga using + button</small></div>'; 
    return; 
  }
  c.innerHTML = currentViewMode === 'grid' ? `<div class="media-grid">${data.map(cardHTML).join('')}</div>` : `<div class="media-list">${data.map(listHTML).join('')}</div>`;
  document.getElementById('btn-grid').className = 'view-btn' + (currentViewMode === 'grid' ? ' active' : '');

function updateGenreCloud(){
  const genres = new Set();
  mediaData.forEach(m => { if(m.genre) m.genre.split(',').forEach(g => genres.add(g.trim())); });
  const cloud = document.getElementById('genre-cloud');
  if(cloud){
    cloud.innerHTML = [...genres].sort().map(g => `<button class="genre-tag ${currentFilterGenre === g ? 'active' : ''}" onclick="filterGenre('${g.replace(/'/g, "\\'")}')">${g}</button>`).join('');
  }
}

function updateActiveFilters(){
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + currentFilterStatus)?.classList.add('active');
  if(currentFilterType === 'all') document.getElementById('nav-type-all')?.classList.add('active');
  else if(currentFilterType === 'Manga') document.getElementById('nav-type-manga')?.classList.add('active');
  else if(currentFilterType === 'Manhwa') document.getElementById('nav-type-manhwa')?.classList.add('active');
  else if(currentFilterType === 'Manhua') document.getElementById('nav-type-manhua')?.classList.add('active');
  let titleText = 'My ';
  if(currentFilterStatus !== 'all') titleText += `${currentFilterStatus === 'reading' ? '📖 Reading' : currentFilterStatus === 'completed' ? '✅ Completed' : currentFilterStatus === 'plan' ? '📋 Plan' : '⛔ Dropped'} `;
  else titleText += 'All ';
  if(currentFilterType !== 'all') titleText += `· ${currentFilterType} `;
  if(currentFilterGenre !== 'all') titleText += `· <span style="color:var(--gold)">${escapeHtml(currentFilterGenre)}</span>`;
  else titleText += '<em>Collection</em>';
  document.getElementById('section-title').innerHTML = titleText;
}

  const typeIcon = {Manga:'📘',Manhwa:'📱',Manhua:'📙'}[m.type] || '📘';
  const statusIcon = {reading:'📖 Reading',completed:'✅ Completed',plan:'📋 Plan to Read',dropped:'⛔ Dropped'}[m.status] || m.status;
  const progress = m.chapters ? Math.round((m.currentChapter / m.chapters) * 100) : 0;
  document.getElementById('d-title').innerHTML = `${typeIcon} ${escapeHtml(m.title)}`;
  document.getElementById('d-meta').innerHTML = `${m.type} · ${m.year || '—'} ${m.author ? `· ✍️ ${escapeHtml(m.author)}` : ''}`;
  document.getElementById('d-poster').innerHTML = m.cover ? `<img class="detail-poster" src="${m.cover}" onerror="this.outerHTML='<div class=detail-poster style=\"width:80px;height:120px;background:var(--surface2);display:flex;align-items:center;justify-content:center;border-radius:6px\">${letter}</div>';">` : `<div class="detail-poster" style="width:80px;height:120px;background:var(--surface2);display:flex;align-items:center;justify-content:center;border-radius:6px">${letter}</div>`;
  document.getElementById('detail-body').innerHTML = `
    <div style="margin-bottom:1rem">${m.rating ? `<div style="display:flex;align-items:center;gap:.5rem"><span style="font-size:1.5rem;color:var(--gold)">${m.rating}</span><div>${renderStars(m.rating)}</div></div>` : '<div>Not rated</div>'}</div>
    <div style="background:var(--surface2);border-radius:8px;padding:.8rem;margin-bottom:1rem">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem">
        <div><div style="font-size:.65rem;color:var(--text-dim)">PROGRESS</div><div style="font-size:1rem;color:var(--gold)">${m.currentChapter || 0} / ${m.chapters || '?'} ch</div>${m.chapters ? `<div style="font-size:.65rem">${progress}%</div>` : ''}</div>
        <div class="chapter-control"><input type="number" id="quick-chapter-input" class="chapter-input" value="${m.currentChapter || 0}" min="0" max="${m.chapters || 9999}"><button class="update-chapter-btn" onclick="updateChapterQuick(${m.id})">Update</button></div>
      </div>${progress > 0 ? `<div class="progress-bar" style="margin-top:.6rem"><div class="progress-fill" style="width:${progress}%"></div></div>` : ''}
    </div>
    <div><div class="detail-row"><span>Status</span><span style="color:var(--gold)">${statusIcon}</span></div>${m.author ? `<div class="detail-row"><span>Author</span><span>${escapeHtml(m.author)}</span></div>` : ''}${m.genre ? `<div class="detail-row"><span>Genres</span><span>${escapeHtml(m.genre)}</span></div>` : ''}${m.chapters ? `<div class="detail-row"><span>Total Ch</span><span>${m.chapters}</span></div>` : ''}</div>
    ${m.notes ? `<div style="background:var(--surface2);border-left:2px solid var(--gold);padding:.6rem;margin:1rem 0;font-size:.75rem">"${escapeHtml(m.notes)}"</div>` : ''}
    <div style="display:flex;gap:.5rem;margin-top:.5rem"><button class="btn btn-primary" onclick="closeDetail(); openEditModal(${m.id})">✏️ Edit</button><button class="btn" onclick="deleteEntry(${m.id})" style="border-color:var(--red);color:var(--red)">🗑️ Delete</button></div>
  `;
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail(){ document.getElementById('detail-overlay').classList.remove('open'); }
function closeDetailOutside(e){ if(e.target === document.getElementById('detail-overlay')) closeDetail(); }

function toggleSidebar(){
  const aside = document.querySelector('aside');
  if(aside.style.display === 'block' || aside.style.display === 'flex') aside.style.display = 'none';
  else aside.style.display = 'block';
}
window.addEventListener('resize', () => { if(window.innerWidth > 900) document.querySelector('aside').style.display = 'block'; });
document.addEventListener('click', e => { if(!e.target.closest('.tmdb-wrap')) document.getElementById('jikan-dd').style.display = 'none'; });

// Load data saat halaman dimuat
loadFromSheets();
</script>
</body>
</html>
