<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Manga Track — Comic & Manga Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--gold:#C9A84C;--gold-light:#E8C97A;--gold-dim:#8B6E30;--bg:#0A0A0C;--surface:#111116;--surface2:#18181F;--surface3:#1F1F28;--border:#2A2A35;--border-soft:#222230;--text:#F0EEE8;--text-muted:#8A8899;--text-dim:#55546A;--red:#E05555;--green:#5EC47A;--blue:#5B8DEF;--purple:#9B6BF0;--pink:#E86F9C;--orange:#E8A75C;--serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
  .sync-bar{background:var(--surface);border-bottom:1px solid var(--border-soft);padding:.3rem 1rem;display:flex;align-items:center;gap:.5rem;font-size:.7rem;color:var(--text-dim)}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);flex-shrink:0}
  .sync-dot.online{background:var(--green)}.sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite}.sync-dot.error{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  
  header{position:sticky;top:0;z-index:100;background:rgba(10,10,12,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-soft);padding:0 1rem;height:65px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-family:var(--serif);font-size:1.4rem;font-weight:300;letter-spacing:.2em;color:var(--gold);text-transform:uppercase}
  .logo span{color:var(--text-dim);font-style:italic}
  .tagline{display:none}
  .btn{font-family:var(--sans);font-size:.7rem;font-weight:500;padding:.4rem .8rem;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:.2s}
  .btn:hover{border-color:var(--gold-dim);color:var(--gold)}
  .btn-primary{background:linear-gradient(115deg, var(--gold) 0%, var(--gold-dim) 100%);border-color:transparent;color:#0A0A0C}
  
  /* Stats Bar - Status dengan warna */
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border-soft);margin-bottom:0}
  .stat-item{background:var(--surface);padding:0.8rem 0.5rem;text-align:center;cursor:pointer;transition:.2s}
  .stat-item:hover{background:var(--surface2)}
  .stat-label{font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.2rem}
  .stat-value{font-family:var(--serif);font-size:1.4rem;font-weight:300;color:var(--text);line-height:1}
  .stat-badge{display:inline-block;padding:.15rem .5rem;border-radius:12px;font-size:.6rem;font-weight:500;margin-top:.2rem}
  .stat-badge.all{background:var(--text-dim);color:var(--bg)}
  .stat-badge.reading{background:var(--blue);color:white}
  .stat-badge.completed{background:var(--green);color:white}
  .stat-badge.plan{background:var(--purple);color:white}
  
  /* Mobile Filter Bar */
  .filter-bar-mobile{display:flex;flex-wrap:wrap;gap:.4rem;padding:.6rem 1rem;background:var(--surface);border-bottom:1px solid var(--border-soft);overflow-x:auto;white-space:nowrap;scrollbar-width:none}
  .filter-bar-mobile::-webkit-scrollbar{display:none}
  .filter-chip{padding:.3rem .8rem;border-radius:20px;font-size:.7rem;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;transition:.2s;flex-shrink:0}
  .filter-chip.active{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold)}
  .filter-chip.status-reading.active{background:rgba(91,141,239,.2);border-color:var(--blue);color:var(--blue)}
  .filter-chip.status-completed.active{background:rgba(94,196,122,.2);border-color:var(--green);color:var(--green)}
  .filter-chip.status-plan.active{background:rgba(155,107,240,.2);border-color:var(--purple);color:var(--purple)}
  
  /* Genre Section */
  .genre-section{padding:.6rem 1rem;background:var(--surface);border-bottom:1px solid var(--border-soft);display:flex;flex-wrap:wrap;gap:.4rem;align-items:center}
  .genre-label{font-size:.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-right:.2rem}
  .genre-tag{font-size:.7rem;padding:.2rem .6rem;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:.2s}
  .genre-tag:hover,.genre-tag.active{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold)}
  
  /* Main Content */
  main{padding:1rem}
  .content-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
  .section-title{font-family:var(--serif);font-size:1.2rem;font-weight:300}
  .section-title em{color:var(--gold)}
  .view-controls{display:flex;gap:.3rem}
  .view-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;border-radius:2px}
  .view-btn.active{border-color:var(--gold);color:var(--gold)}
  
  .search-row{display:flex;gap:.5rem;margin-bottom:1rem}
  .search-wrap{flex:1;position:relative}
  .search-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.5rem 1rem .5rem 2rem;border-radius:2px;font-size:.8rem}
  .search-icon{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);font-size:.8rem}
  select.filter-select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.5rem;border-radius:2px;font-size:.75rem}
  
  /* Grid Layout */
  .media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:0.8rem}
  .media-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:8px;overflow:hidden;cursor:pointer;transition:.2s;position:relative}
  .media-card:hover{transform:translateY(-2px);border-color:var(--gold-dim)}
  .card-poster{width:100%;aspect-ratio:2/3;object-fit:cover}
  .poster-placeholder{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:var(--surface2);font-size:2rem}
  .status-badge{position:absolute;top:.4rem;right:.4rem;font-size:.6rem;padding:.2rem .5rem;border-radius:20px;font-weight:500}
  .status-badge.reading{background:var(--blue);color:white}
  .status-badge.completed{background:var(--green);color:white}
  .status-badge.plan{background:var(--purple);color:white}
  .status-badge.dropped{background:var(--red);color:white}
  .card-info{padding:.6rem}
  .card-title{font-size:.75rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-meta{font-size:.65rem;color:var(--text-dim);margin-top:.2rem}
  .star-row{display:flex;gap:.1rem;margin-top:.3rem}
  .star{font-size:.6rem;color:var(--text-dim)}.star.filled{color:var(--gold)}
  .progress-bar{height:2px;background:var(--border);margin-top:.4rem;border-radius:2px}
  .progress-fill{height:100%;background:var(--gold);border-radius:2px}
  
  /* List View */
  .media-list{display:flex;flex-direction:column;gap:.5rem}
  .list-item{background:var(--surface);border:1px solid var(--border-soft);border-radius:8px;display:grid;grid-template-columns:50px 1fr auto;gap:.8rem;align-items:center;padding:.6rem;cursor:pointer}
  .list-thumb{width:50px;height:70px;background:var(--surface2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
  .list-thumb img{width:100%;height:100%;object-fit:cover;border-radius:4px}
  .list-title{font-size:.85rem;font-weight:500}
  .list-detail{font-size:.65rem;color:var(--text-dim);margin-top:.2rem}
  
  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:.2s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
  .modal-header{padding:1rem;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:center}
  .modal-title{font-family:var(--serif);font-size:1.2rem;font-weight:300}
  .modal-body{padding:1rem}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
  .form-group{display:flex;flex-direction:column;gap:.3rem}
  .form-group.full{grid-column:1/-1}
  label{font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim)}
  input,select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.5rem;border-radius:6px;font-size:.8rem}
  .star-rating{display:flex;gap:.2rem}
  .star-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-dim)}
  .star-btn.active{color:var(--gold)}
  .modal-footer{display:flex;justify-content:flex-end;gap:.5rem;margin-top:1rem;padding-top:.8rem;border-top:1px solid var(--border-soft)}
  .toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--gold);padding:.5rem 1rem;border-radius:20px;font-size:.75rem;z-index:500;opacity:0;transition:.2s;white-space:nowrap}
  .toast.show{opacity:1}
  .empty{text-align:center;padding:2rem;color:var(--text-dim)}
  
  /* Detail Modal */
  .detail-poster{width:80px;height:120px;object-fit:cover;border-radius:6px}
  .detail-row{display:flex;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--border-soft)}
  .chapter-control{display:flex;gap:.5rem;align-items:center;margin-top:.5rem}
  .chapter-input{width:80px;background:var(--surface2);border:1px solid var(--border);color:var(--gold);padding:.4rem;border-radius:6px;text-align:center}
  .update-chapter-btn{padding:.4rem .8rem;background:var(--gold);color:#0A0A0C;border:none;border-radius:6px;cursor:pointer;font-size:.7rem}
  
  @media(min-width:768px){
    .tagline{display:inline-block;font-size:.65rem;margin-left:.5rem;padding-left:.5rem;border-left:1px solid var(--border);color:var(--text-dim)}
    .logo{font-size:1.6rem}
    header{padding:0 2rem;height:75px}
    .stats-bar .stat-value{font-size:1.8rem}
    .media-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1.2rem}
  }
</style>
</head>
<body>

<div class="sync-bar">
  <span class="sync-dot" id="sync-dot"></span>
  <span id="sync-status">Connecting...</span>
</div>

<header>
  <div style="display:flex;align-items:baseline">
    <div class="logo">Manga<span>Track</span></div>
    <div class="tagline">track your manga & manhwa journey</div>
  </div>
  <div>
    <button class="btn" onclick="loadFromSheets()">↻</button>
    <button class="btn btn-primary" onclick="openModal()">+</button>
  </div>
</header>

<!-- Stats Bar dengan Warna Status -->
<div class="stats-bar">
  <div class="stat-item" onclick="filterStatus('all')"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">0</div><span class="stat-badge all">All</span></div>
  <div class="stat-item" onclick="filterStatus('reading')"><div class="stat-label">Reading</div><div class="stat-value" id="stat-reading">0</div><span class="stat-badge reading">📖</span></div>
  <div class="stat-item" onclick="filterStatus('completed')"><div class="stat-label">Completed</div><div class="stat-value" id="stat-completed">0</div><span class="stat-badge completed">✅</span></div>
  <div class="stat-item" onclick="filterStatus('plan')"><div class="stat-label">Plan</div><div class="stat-value" id="stat-plan">0</div><span class="stat-badge plan">📋</span></div>
</div>

<!-- Mobile Filter Bar - Status -->
<div class="filter-bar-mobile" id="mobile-status-bar">
  <button class="filter-chip active" data-status="all" onclick="filterStatus('all')">📚 All</button>
  <button class="filter-chip" data-status="reading" onclick="filterStatus('reading')">📖 Reading</button>
  <button class="filter-chip" data-status="completed" onclick="filterStatus('completed')">✅ Completed</button>
  <button class="filter-chip" data-status="plan" onclick="filterStatus('plan')">📋 Plan</button>
  <button class="filter-chip" data-status="dropped" onclick="filterStatus('dropped')">⛔ Dropped</button>
</div>

<!-- Type Filter Bar -->
<div class="filter-bar-mobile" id="mobile-type-bar">
  <button class="filter-chip active" data-type="all" onclick="filterType('all')">◈ All</button>
  <button class="filter-chip" data-type="Manga" onclick="filterType('Manga')">📘 Manga</button>
  <button class="filter-chip" data-type="Manhwa" onclick="filterType('Manhwa')">📱 Manhwa</button>
  <button class="filter-chip" data-type="Manhua" onclick="filterType('Manhua')">📙 Manhua</button>
</div>

<!-- Genre Section -->
<div class="genre-section" id="genre-section">
  <span class="genre-label">🎭 Genre:</span>
  <button class="genre-tag active" data-genre="all" onclick="filterGenre('all')">All</button>
  <div id="genre-list" style="display:flex;flex-wrap:wrap;gap:.4rem"></div>
</div>

<main>
  <div class="content-header">
    <div class="section-title" id="section-title">My <em>Collection</em></div>
    <div class="view-controls">
      <button class="view-btn active" id="btn-grid" onclick="setView('grid')">⊞</button>
      <button class="view-btn" id="btn-list" onclick="setView('list')">☰</button>
    </div>
  </div>
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="Search title, author..." id="search-input" oninput="renderMedia()">
    </div>
    <select class="filter-select" id="sort-select" onchange="renderMedia()">
      <option value="added">Recent</option>
      <option value="rating">Rating</option>
      <option value="title">A-Z</option>
    </select>
  </div>
  <div id="media-container"></div>
</main>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="modal-heading">Add Manga</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div style="margin-bottom:.8rem"><label>Cari dari AniList</label><div class="tmdb-wrap"><input class="tmdb-input" id="anilist-search" type="text" placeholder="Ketik judul..." oninput="onAnilistSearch(this.value)" style="width:100%;background:var(--surface2);border:1px solid var(--border);padding:.5rem;border-radius:6px"><div class="tmdb-dropdown" id="anilist-dd" style="position:absolute;background:var(--surface2);width:100%;max-height:200px;overflow-y:auto;display:none"></div></div></div>
      <div class="form-grid">
        <div class="form-group full"><label>Title</label><input type="text" id="f-title"></div>
        <div class="form-group"><label>Type</label><select id="f-type"><option>Manga</option><option>Manhwa</option><option>Manhua</option></select></div>
        <div class="form-group"><label>Year</label><input type="number" id="f-year"></div>
        <div class="form-group"><label>Status</label><select id="f-status"><option value="plan">Plan to Read</option><option value="reading">Reading</option><option value="completed">Completed</option><option value="dropped">Dropped</option></select></div>
        <div class="form-group"><label>Author</label><input type="text" id="f-author"></div>
        <div class="form-group"><label>Genres</label><input type="text" id="f-genre" placeholder="Action, Fantasy..."></div>
        <div class="form-group"><label>Total Ch</label><input type="number" id="f-chapters"></div>
        <div class="form-group"><label>Current Ch</label><input type="number" id="f-current-chapter"></div>
        <div class="form-group full"><label>Rating</label><div class="star-rating" id="star-rating"><button class="star-btn" data-v="1" onclick="setRating(1)">★</button><button class="star-btn" data-v="2" onclick="setRating(2)">★</button><button class="star-btn" data-v="3" onclick="setRating(3)">★</button><button class="star-btn" data-v="4" onclick="setRating(4)">★</button><button class="star-btn" data-v="5" onclick="setRating(5)">★</button></div></div>
        <div class="form-group full"><label>Notes</label><textarea id="f-notes" rows="2"></textarea></div>
      </div>
      <input type="hidden" id="f-cover"><input type="hidden" id="f-anilist-id">
      <div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="btn-save" onclick="saveEntry()">Save</button></div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detail-overlay" onclick="closeDetailOutside(event)">
  <div class="modal">
    <div class="modal-header"><div style="display:flex;gap:.8rem;flex:1"><div id="d-poster"></div><div><div class="modal-title" id="d-title"></div><div style="font-size:.7rem;color:var(--text-dim)" id="d-meta"></div></div></div><button class="modal-close" onclick="closeDetail()">✕</button></div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_SHEETS = 'https://script.google.com/macros/s/AKfycbw7BjczrAVkCTdumUlXPZbWZLGpbs71O_FjqEkH5K_vCwaQKC1WAuoZ6GHdAG_dUD7M/exec';
const ANILIST_API = 'https://graphql.anilist.co';

let mediaData = [];
let currentRating = 0;
let editingId = null;
let filterSt = 'all';
let filterTy = 'all';
let filterGenreVal = 'all';
let viewMode = 'grid';
let anilistTimer = null;

function setSyncStatus(status, msg) { const dot=document.getElementById('sync-dot'); const text=document.getElementById('sync-status'); if(dot)dot.className='sync-dot '+status; if(text)text.textContent=msg; }
function showToast(msg, isError) { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(isError?' error':''); setTimeout(()=>t.classList.remove('show'),2000); }
async function apiSheets(body) { const res=await fetch(API_SHEETS,{method:'POST',body:JSON.stringify(body)}); const text=await res.text(); try{return JSON.parse(text);}catch(e){throw new Error('Server error');} }
async function loadFromSheets() { setSyncStatus('syncing','Loading...'); try{const res=await fetch(API_SHEETS+'?action=getAll'); const data=await res.json(); if(data.error)throw new Error(data.error); mediaData=(data.manga||[]).map(m=>({id:Number(m.id),title:m.title,type:m.type||'Manga',year:Number(m.year),status:m.status||'plan',genre:m.genre||'',author:m.author||'',chapters:Number(m.chapters)||0,currentChapter:Number(m.currentChapter)||0,volumes:m.volumes||'',rating:Number(m.rating)||0,notes:m.notes||'',added:Number(m.added)||Date.now(),cover:m.cover||'',anilistId:m.anilistId||''})); setSyncStatus('online','Synced'); renderMedia(); }catch(err){setSyncStatus('error','Error');} }

async function searchAnilist(q){ const query=`query($search:String){Media(search:$search,type:MANGA){id title{romaji}coverImage{large}startDate{year}chapters volumes genres staff{edges{node{name{full}primaryOccupations}}}}}`; try{const res=await fetch(ANILIST_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query,variables:{search:q}})}); const data=await res.json(); return data.data?.Media||null;}catch(e){return null;} }
function onAnilistSearch(val){ clearTimeout(anilistTimer); if(val.length<2){document.getElementById('anilist-dd').style.display='none'; return;} anilistTimer=setTimeout(async()=>{ const manga=await searchAnilist(val); const dd=document.getElementById('anilist-dd'); if(!manga){dd.style.display='none'; return;} let author=''; if(manga.staff?.edges){const a=manga.staff.edges.find(e=>e.node.primaryOccupations?.some(o=>o.includes('Author'))); if(a)author=a.node.name.full;} dd.innerHTML=`<div class="tmdb-item" style="padding:.5rem;cursor:pointer;border-bottom:1px solid var(--border)" onclick="selectManga(this)" data-id="${manga.id}" data-title="${manga.title.romaji}" data-cover="${manga.coverImage?.large||''}" data-year="${manga.startDate?.year||''}" data-chapters="${manga.chapters||''}" data-volumes="${manga.volumes||''}" data-genres="${(manga.genres||[]).slice(0,3).join(', ')}" data-author="${author}"><div>${manga.coverImage?.large?`<img src="${manga.coverImage.large}" style="width:36px;height:54px;object-fit:cover">`:`<div style="width:36px;height:54px;background:var(--surface3);display:flex;align-items:center;justify-content:center">${(manga.title.romaji||'?').charAt(0)}</div>`}</div><div><div style="font-size:.8rem">${manga.title.romaji}</div><div style="font-size:.65rem;color:var(--text-dim)">${manga.genres?.slice(0,2).join(', ')||''} · ${manga.chapters||'?'} ch</div></div></div>`; dd.style.display='block'; },400); }
function selectManga(el){ document.getElementById('f-title').value=el.dataset.title; document.getElementById('f-year').value=el.dataset.year; document.getElementById('f-chapters').value=el.dataset.chapters; document.getElementById('f-volumes').value=el.dataset.volumes; document.getElementById('f-genre').value=el.dataset.genres; document.getElementById('f-author').value=el.dataset.author; document.getElementById('f-cover').value=el.dataset.cover; document.getElementById('f-anilist-id').value=el.dataset.id; document.getElementById('anilist-search').value=el.dataset.title; const box=document.getElementById('poster-box'); if(el.dataset.cover) box.innerHTML=`<img src="${el.dataset.cover}" style="width:70px;height:105px;object-fit:cover;border-radius:6px">`; else box.innerHTML=`<div style="width:70px;height:105px;background:var(--surface2);display:flex;align-items:center;justify-content:center;border-radius:6px">${el.dataset.title.charAt(0)}</div>`; document.getElementById('anilist-dd').style.display='none'; }

async function saveEntry(){ const title=document.getElementById('f-title').value.trim(); if(!title){showToast('Enter title',true); return;} const entry={id:editingId||Date.now(),title,type:document.getElementById('f-type').value,year:parseInt(document.getElementById('f-year').value)||new Date().getFullYear(),status:document.getElementById('f-status').value,genre:document.getElementById('f-genre').value||'',author:document.getElementById('f-author').value||'',chapters:parseInt(document.getElementById('f-chapters').value)||0,currentChapter:parseInt(document.getElementById('f-current-chapter').value)||0,volumes:document.getElementById('f-volumes').value||'',rating:currentRating,notes:document.getElementById('f-notes').value||'',cover:document.getElementById('f-cover').value||'',anilistId:document.getElementById('f-anilist-id').value||'',added:editingId?(mediaData.find(x=>x.id===editingId)?.added||Date.now()):Date.now()}; setSyncStatus('syncing','Saving...'); try{await apiSheets({action:'save',manga:entry}); if(editingId){const i=mediaData.findIndex(x=>x.id===editingId); if(i>-1)mediaData[i]=entry;}else mediaData.push(entry); renderMedia(); closeModal(); setSyncStatus('online','Saved!'); showToast('Saved!');}catch(err){showToast('Save failed',true); setSyncStatus('error','Failed');} }

function getFiltered(){ let data=[...mediaData]; if(filterSt!=='all') data=data.filter(x=>x.status===filterSt); if(filterTy!=='all') data=data.filter(x=>x.type===filterTy); if(filterGenreVal!=='all') data=data.filter(x=>x.genre && x.genre.toLowerCase().includes(filterGenreVal.toLowerCase())); const q=document.getElementById('search-input').value.toLowerCase(); if(q) data=data.filter(x=>x.title.toLowerCase().includes(q)||(x.author&&x.author.toLowerCase().includes(q))); const sort=document.getElementById('sort-select').value; if(sort==='rating') data.sort((a,b)=>b.rating-a.rating); else if(sort==='title') data.sort((a,b)=>a.title.localeCompare(b.title)); else data.sort((a,b)=>b.added-a.added); return data; }

function renderStars(r){ return [1,2,3,4,5].map(i=>`<span class="star${i<=r?' filled':''}">★</span>`).join(''); }
function getStatusBadgeClass(s){ return {reading:'reading',completed:'completed',plan:'plan',dropped:'dropped'}[s]||'plan'; }
function getStatusIcon(s){ return {reading:'📖',completed:'✅',plan:'📋',dropped:'⛔'}[s]||'📚'; }

function cardHTML(m){ const letter=m.title.charAt(0).toUpperCase(); const progress=m.chapters?Math.round((m.currentChapter/m.chapters)*100):0; const typeIcon={Manga:'📘',Manhwa:'📱',Manhua:'📙'}[m.type]||'📘'; return `<div class="media-card" onclick="showDetail(${m.id})">${m.cover?`<img class="card-poster" src="${m.cover}" onerror="this.style.display='none';">`:''}<div class="poster-placeholder" style="${m.cover?'display:none':'display:flex'}">${letter}</div><div class="status-badge ${getStatusBadgeClass(m.status)}">${getStatusIcon(m.status)}</div><div class="card-info"><div class="card-title">${m.title}</div><div class="card-meta">${typeIcon} ${m.type} · ${m.year||'?'}</div><div class="card-meta">📖 ${m.currentChapter}/${m.chapters||'?'}</div>${m.rating?`<div class="star-row">${renderStars(m.rating)}</div>`:''}${progress>0&&progress<100?`<div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>`:''}</div></div>`; }

function listHTML(m){ const letter=m.title.charAt(0).toUpperCase(); const typeIcon={Manga:'📘',Manhwa:'📱',Manhua:'📙'}[m.type]||'📘'; return `<div class="list-item" onclick="showDetail(${m.id})"><div class="list-thumb">${m.cover?`<img src="${m.cover}">`:letter}</div><div><div class="list-title">${m.title}</div><div class="list-detail">${typeIcon} ${m.type} · ${m.year||'?'} · Ch ${m.currentChapter}/${m.chapters||'?'}</div></div><div class="status-badge ${getStatusBadgeClass(m.status)}" style="position:static;padding:.2rem .5rem">${getStatusIcon(m.status)}</div></div>`; }

function renderMedia(){ updateStats(); updateGenreList(); updateActiveFiltersUI(); const data=getFiltered(); const c=document.getElementById('media-container'); if(!data.length){c.innerHTML='<div class="empty">📭 No manga found<br><small>Add your first manga using + button</small></div>'; return;} c.innerHTML=viewMode==='grid'?`<div class="media-grid">${data.map(cardHTML).join('')}</div>`:`<div class="media-list">${data.map(listHTML).join('')}</div>`; document.getElementById('btn-grid').className='view-btn'+(viewMode==='grid'?' active':''); document.getElementById('btn-list').className='view-btn'+(viewMode==='list'?' active':''); }

function updateStats(){ document.getElementById('stat-total').textContent=mediaData.length; document.getElementById('stat-reading').textContent=mediaData.filter(x=>x.status==='reading').length; document.getElementById('stat-completed').textContent=mediaData.filter(x=>x.status==='completed').length; document.getElementById('stat-plan').textContent=mediaData.filter(x=>x.status==='plan').length; }

function updateGenreList(){ const genres=new Set(); mediaData.forEach(m=>{if(m.genre)m.genre.split(',').forEach(g=>genres.add(g.trim()));}); const genreList=document.getElementById('genre-list'); if(!genreList)return; genreList.innerHTML=[...genres].sort().map(g=>`<button class="genre-tag ${filterGenreVal===g?'active':''}" onclick="filterGenre('${g.replace(/'/g,"\\'")}')">${g}</button>`).join(''); }

function updateActiveFiltersUI(){ document.querySelectorAll('#mobile-status-bar .filter-chip').forEach(el=>{el.classList.toggle('active',el.dataset.status===filterSt);}); document.querySelectorAll('#mobile-type-bar .filter-chip').forEach(el=>{el.classList.toggle('active',el.dataset.type===filterTy);}); document.querySelectorAll('.genre-tag').forEach(el=>{el.classList.toggle('active',el.textContent===filterGenreVal);}); let titleText='My '; if(filterSt!=='all') titleText+=`${filterSt==='reading'?'📖 Reading':filterSt==='completed'?'✅ Completed':filterSt==='plan'?'📋 Plan':'⛔ Dropped'} `; else titleText+='All '; if(filterTy!=='all') titleText+=`· ${filterTy} `; if(filterGenreVal!=='all') titleText+=`· <span style="color:var(--gold)">${filterGenreVal}</span>`; else titleText+='<em>Collection</em>'; document.getElementById('section-title').innerHTML=titleText; }

function filterStatus(s){ filterSt=s; renderMedia(); }
function filterType(t){ filterTy=t; renderMedia(); }
function filterGenre(g){ filterGenreVal=(filterGenreVal===g)?'all':g; renderMedia(); }
function setView(v){ viewMode=v; renderMedia(); }
function openModal(id){ editingId=id||null; const m=id?mediaData.find(x=>x.id===id):null; document.getElementById('modal-heading').textContent=m?'Edit Manga':'Add Manga'; document.getElementById('f-title').value=m?.title||''; document.getElementById('f-type').value=m?.type||'Manga'; document.getElementById('f-year').value=m?.year||''; document.getElementById('f-status').value=m?.status||'plan'; document.getElementById('f-genre').value=m?.genre||''; document.getElementById('f-author').value=m?.author||''; document.getElementById('f-chapters').value=m?.chapters||''; document.getElementById('f-current-chapter').value=m?.currentChapter||''; document.getElementById('f-volumes').value=m?.volumes||''; document.getElementById('f-notes').value=m?.notes||''; document.getElementById('f-cover').value=m?.cover||''; document.getElementById('f-anilist-id').value=m?.anilistId||''; setRating(m?.rating||0); const box=document.getElementById('poster-box'); if(m?.cover) box.innerHTML=`<img src="${m.cover}" style="width:70px;height:105px;object-fit:cover;border-radius:6px">`; else box.innerHTML=`<div style="width:70px;height:105px;background:var(--surface2);display:flex;align-items:center;justify-content:center;border-radius:6px">${m?.title?.charAt(0)||'?'}</div>`; document.getElementById('modal-overlay').classList.add('open'); }
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); editingId=null; }
function closeModalOutside(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }
function setRating(v){ currentRating=v; document.querySelectorAll('.star-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.v)<=v)); }

async function updateChapterQuick(id){ const input=document.getElementById('quick-chapter-input'); const newChapter=parseInt(input.value)||0; const manga=mediaData.find(x=>x.id===id); if(!manga)return; const updatedManga={...manga,currentChapter:newChapter}; const idx=mediaData.findIndex(x=>x.id===id); if(idx!==-1)mediaData[idx]=updatedManga; setSyncStatus('syncing','Updating...'); try{await apiSheets({action:'save',manga:updatedManga}); renderMedia(); setSyncStatus('online','Updated'); showToast(`Chapter ${newChapter}`); closeDetail(); showDetail(id); }catch(err){showToast('Update failed',true);} }

function showDetail(id){ const m=mediaData.find(x=>x.id===id); if(!m)return; const letter=m.title.charAt(0).toUpperCase(); const typeIcon={Manga:'📘',Manhwa:'📱',Manhua:'📙'}[m.type]||'📘'; const statusIcon={reading:'📖 Reading',completed:'✅ Completed',plan:'📋 Plan to Read',dropped:'⛔ Dropped'}[m.status]||m.status; const progress=m.chapters?Math.round((m.currentChapter/m.chapters)*100):0; document.getElementById('d-title').innerHTML=`${typeIcon} ${m.title}`; document.getElementById('d-meta').innerHTML=`${m.type} · ${m.year||'—'} ${m.author?`· ✍️ ${m.author}`:''}`; document.getElementById('d-poster').innerHTML=m.cover?`<img class="detail-poster" src="${m.cover}" onerror="this.outerHTML='<div class=detail-poster style=\"width:80px;height:120px;background:var(--surface2);display:flex;align-items:center;justify-content:center;border-radius:6px\">${letter}</div>';">`:`<div class="detail-poster" style="width:80px;height:120px;background:var(--surface2);display:flex;align-items:center;justify-content:center;border-radius:6px">${letter}</div>`; document.getElementById('detail-body').innerHTML=`<div style="margin-bottom:1rem">${m.rating?`<div style="display:flex;align-items:center;gap:.5rem"><span class="detail-rating-big" style="font-size:1.8rem;color:var(--gold)">${m.rating}</span><div>${renderStars(m.rating)}</div></div>`:'<div style="color:var(--text-dim)">Not rated</div>'}</div><div style="background:var(--surface2);border-radius:8px;padding:.8rem;margin-bottom:1rem"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem"><div><div style="font-size:.65rem;color:var(--text-dim)">PROGRESS</div><div style="font-size:1.2rem;color:var(--gold)">${m.currentChapter||0} / ${m.chapters||'?'} ch</div>${m.chapters?`<div style="font-size:.65rem">${progress}%</div>`:''}</div><div class="chapter-control"><input type="number" id="quick-chapter-input" class="chapter-input" value="${m.currentChapter||0}" min="0" max="${m.chapters||9999}"><button class="update-chapter-btn" onclick="updateChapterQuick(${m.id})">Update</button></div></div>${progress>0?`<div class="progress-bar" style="margin-top:.8rem"><div class="progress-fill" style="width:${progress}%"></div></div>`:''}</div><div><div class="detail-row"><span class="detail-key">Status</span><span class="detail-val" style="color:var(--gold)">${statusIcon}</span></div>${m.author?`<div class="detail-row"><span class="detail-key">Author</span><span class="detail-val">${m.author}</span></div>`:''}${m.genre?`<div class="detail-row"><span class="detail-key">Genres</span><span class="detail-val">${m.genre}</span></div>`:''}${m.chapters?`<div class="detail-row"><span class="detail-key">Total Ch</span><span class="detail-val">${m.chapters}</span></div>`:''}</div>${m.notes?`<div style="background:var(--surface2);border-left:2px solid var(--gold);padding:.6rem;margin:1rem 0;font-size:.75rem">"${m.notes}"</div>`:''}<div style="display:flex;gap:.5rem;margin-top:.5rem"><button class="btn btn-primary" onclick="closeDetail(); openModal(${m.id})">✏️ Edit</button><button class="btn" onclick="deleteEntry(${m.id})" style="border-color:var(--red);color:var(--red)">🗑️ Delete</button></div>`; document.getElementById('detail-overlay').classList.add('open'); }

function closeDetail(){ document.getElementById('detail-overlay').classList.remove('open'); }
function closeDetailOutside(e){ if(e.target===document.getElementById('detail-overlay')) closeDetail(); }
async function deleteEntry(id){ if(!confirm('Remove?'))return; setSyncStatus('syncing','Deleting...'); try{await apiSheets({action:'delete',id}); mediaData=mediaData.filter(x=>x.id!==id); renderMedia(); closeDetail(); setSyncStatus('online','Deleted'); showToast('Removed');}catch(err){showToast('Delete failed',true);} }

document.addEventListener('click',e=>{if(!e.target.closest('.tmdb-wrap'))document.getElementById('anilist-dd').style.display='none';});
loadFromSheets();
</script>
</body>
