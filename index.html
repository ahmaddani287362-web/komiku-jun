<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga Track — Comic & Manga Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--gold:#C9A84C;--gold-light:#E8C97A;--gold-dim:#8B6E30;--bg:#0A0A0C;--surface:#111116;--surface2:#18181F;--surface3:#1F1F28;--border:#2A2A35;--border-soft:#222230;--text:#F0EEE8;--text-muted:#8A8899;--text-dim:#55546A;--red:#E05555;--green:#5EC47A;--blue:#5B8DEF;--purple:#9B6BF0;--pink:#E86F9C;--orange:#E8A75C;--serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
  .sync-bar{background:var(--surface);border-bottom:1px solid var(--border-soft);padding:.4rem 2.5rem;display:flex;align-items:center;gap:.6rem;font-size:.75rem;color:var(--text-dim)}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);flex-shrink:0}
  .sync-dot.online{background:var(--green)}.sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite}.sync-dot.error{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  
  header{position:sticky;top:0;z-index:100;background:rgba(10,10,12,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-soft);padding:0 2.5rem;height:80px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-family:var(--serif);font-size:1.9rem;font-weight:300;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;background:linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 70%, #EEDBAA 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .logo span{color:var(--text-dim);font-style:italic;background:none;-webkit-background-clip:unset;color:var(--text-muted)}
  .tagline{font-family:var(--sans);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);border-left:1px solid var(--border);padding-left:1rem}
  .tagline em{color:var(--gold-light)}
  .btn{font-family:var(--sans);font-size:.8rem;font-weight:500;padding:.55rem 1.35rem;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:.2s}
  .btn:hover{border-color:var(--gold-dim);color:var(--gold)}
  .btn-primary{background:linear-gradient(115deg, var(--gold) 0%, var(--gold-dim) 100%);border-color:transparent;color:#0A0A0C}
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border-soft);border-bottom:1px solid var(--border-soft)}
  .stat-item{background:var(--surface);padding:1.5rem 2.5rem;cursor:pointer;transition:.2s}
  .stat-item:hover{background:var(--surface2)}
  .stat-label{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim)}
  .stat-value{font-family:var(--serif);font-size:2.2rem;font-weight:300;color:var(--text)}
  main{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 130px)}
  aside{background:var(--surface);border-right:1px solid var(--border-soft);padding:2rem 0;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto}
  .sidebar-section{padding:0 1.5rem;margin-bottom:2rem}
  .sidebar-title{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);border-bottom:1px solid var(--border-soft);padding-bottom:.5rem;margin-bottom:.75rem}
  .nav-item{display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;cursor:pointer;color:var(--text-muted);font-size:.875rem}
  .nav-item:hover{background:var(--surface2);color:var(--text)}
  .nav-item.active{background:rgba(201,168,76,.08);color:var(--gold);border-left:2px solid var(--gold)}
  .nav-count{margin-left:auto;font-size:.7rem;background:var(--surface2);padding:.15rem .5rem;border-radius:20px}
  .content{padding:2rem 2.5rem;background:var(--bg)}
  .section-title{font-family:var(--serif);font-size:1.75rem;font-weight:300;margin-bottom:1.5rem}
  .section-title em{color:var(--gold)}
  .search-row{display:flex;gap:.75rem;margin-bottom:1.5rem}
  .search-wrap{flex:1;position:relative}
  .search-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.65rem 1rem .65rem 2.75rem;border-radius:2px}
  .search-icon{position:absolute;left:.9rem;top:50%;transform:translateY(-50%)}
  select.filter-select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.65rem 1rem;border-radius:2px}
  .media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1.25rem}
  .media-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:2px;overflow:hidden;cursor:pointer;transition:.2s;position:relative}
  .media-card:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
  .card-poster{width:100%;aspect-ratio:2/3;object-fit:cover}
  .poster-placeholder{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:var(--surface2);font-size:3rem}
  .card-badge{position:absolute;top:.6rem;right:.6rem;font-size:.65rem;padding:.25rem .5rem;border-radius:1px;background:rgba(0,0,0,.7)}
  .card-info{padding:.75rem}
  .card-title{font-size:.85rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-meta{font-size:.72rem;color:var(--text-dim)}
  .star-row{display:flex;gap:.1rem;margin-top:.4rem}
  .star{font-size:.75rem;color:var(--text-dim)}.star.filled{color:var(--gold)}
  .progress-bar{height:2px;background:var(--border);margin-top:.6rem}
  .progress-fill{height:100%;background:var(--gold)}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:.2s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:2px;width:100%;max-width:700px;max-height:85vh;overflow-y:auto}
  .modal-header{padding:1.5rem 2rem;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:center}
  .modal-title{font-family:var(--serif);font-size:1.5rem;font-weight:300}
  .modal-close{background:none;border:1px solid var(--border);color:var(--text-muted);width:32px;height:32px;border-radius:2px;cursor:pointer}
  .modal-body{padding:1.5rem 2rem}
  .tmdb-wrap{position:relative;margin-bottom:1.25rem}
  .tmdb-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.65rem .9rem;border-radius:2px}
  .tmdb-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-top:none;max-height:280px;overflow-y:auto;display:none;z-index:50}
  .tmdb-item{display:flex;gap:.75rem;padding:.6rem .9rem;cursor:pointer;border-bottom:1px solid var(--border-soft)}
  .tmdb-item:hover{background:var(--surface3)}
  .tmdb-thumb{width:36px;height:54px;object-fit:cover}
  .add-layout{display:flex;gap:1.25rem;margin-bottom:1.25rem}
  .poster-box{flex-shrink:0}
  .poster-ph{width:90px;height:135px;background:var(--surface2);display:flex;align-items:center;justify-content:center;border-radius:2px;font-size:2rem}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .form-group{display:flex;flex-direction:column;gap:.4rem}
  .form-group.full{grid-column:1/-1}
  label{font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim)}
  input,select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.65rem .9rem;border-radius:2px}
  .star-rating{display:flex;gap:.25rem}
  .star-btn{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text-dim)}
  .star-btn.active{color:var(--gold)}
  .modal-footer{display:flex;justify-content:flex-end;gap:.75rem;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border-soft)}
  .detail-poster{width:110px;height:165px;object-fit:cover;border-radius:2px}
  .detail-poster-ph{width:110px;height:165px;background:var(--surface2);display:flex;align-items:center;justify-content:center;border-radius:2px;font-size:2.5rem}
  .detail-rating-big{font-family:var(--serif);font-size:3rem;font-weight:300;color:var(--gold)}
  .detail-row{display:flex;justify-content:space-between;align-items:center;padding:.8rem 0;border-bottom:1px solid var(--border-soft)}
  .detail-row:last-child{border-bottom:none}
  .detail-key{color:var(--text-dim)}
  .detail-val{color:var(--text);text-align:right}
  .chapter-control{display:flex;align-items:center;gap:1rem;margin-top:.5rem}
  .chapter-input{width:100px;background:var(--surface2);border:1px solid var(--border);color:var(--gold);padding:.5rem;border-radius:2px;text-align:center;font-size:1rem}
  .update-chapter-btn{padding:.4rem 1rem;background:var(--gold);color:#0A0A0C;border:none;border-radius:2px;cursor:pointer;font-size:.75rem}
  .toast{position:fixed;bottom:2rem;right:2rem;background:var(--surface);border:1px solid var(--gold-dim);padding:.75rem 1.25rem;border-radius:2px;z-index:500;opacity:0;transition:.2s}
  .toast.show{opacity:1}
  .empty{text-align:center;padding:4rem;color:var(--text-dim)}
  @media(max-width:900px){main{grid-template-columns:1fr}aside{display:none}.stats-bar{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="sync-bar">
  <span class="sync-dot" id="sync-dot"></span>
  <span id="sync-status">Connecting...</span>
</div>

<header>
  <div style="display:flex;align-items:baseline;gap:1rem">
    <div class="logo">Manga<span>Track</span></div>
    <div class="tagline">track your <em>manga</em> & <em>manhwa</em> journey</div>
  </div>
  <div>
    <button class="btn" onclick="loadFromSheets()">↻ Sync</button>
    <button class="btn btn-primary" onclick="openModal()">+ Add Manga</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item" onclick="filterStatus('all')"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">0</div></div>
  <div class="stat-item" onclick="filterStatus('reading')"><div class="stat-label">Reading</div><div class="stat-value" id="stat-reading">0</div></div>
  <div class="stat-item" onclick="filterStatus('completed')"><div class="stat-label">Completed</div><div class="stat-value" id="stat-completed">0</div></div>
  <div class="stat-item" onclick="filterStatus('plan')"><div class="stat-label">Plan to Read</div><div class="stat-value" id="stat-plan">0</div></div>
</div>

<main>
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-title">Status</div>
      <div class="nav-item active" id="nav-all" onclick="filterStatus('all')">📚 All Manga<span class="nav-count" id="cnt-all">0</span></div>
      <div class="nav-item" id="nav-reading" onclick="filterStatus('reading')">📖 Reading<span class="nav-count" id="cnt-reading">0</span></div>
      <div class="nav-item" id="nav-completed" onclick="filterStatus('completed')">✅ Completed<span class="nav-count" id="cnt-completed">0</span></div>
      <div class="nav-item" id="nav-plan" onclick="filterStatus('plan')">📋 Plan to Read<span class="nav-count" id="cnt-plan">0</span></div>
      <div class="nav-item" id="nav-dropped" onclick="filterStatus('dropped')">⛔ Dropped<span class="nav-count" id="cnt-dropped">0</span></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Type</div>
      <div class="nav-item" id="nav-type-all" onclick="filterType('all')">◈ All Types</div>
      <div class="nav-item" id="nav-type-manga" onclick="filterType('Manga')">📘 Manga</div>
      <div class="nav-item" id="nav-type-manhwa" onclick="filterType('Manhwa')">📱 Manhwa</div>
      <div class="nav-item" id="nav-type-manhua" onclick="filterType('Manhua')">📙 Manhua</div>
    </div>
  </aside>

  <div class="content">
    <div class="section-title">My <em>Manga Collection</em></div>
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Search manga, author, genre..." id="search-input" oninput="renderMedia()">
      </div>
      <select class="filter-select" id="sort-select" onchange="renderMedia()">
        <option value="added">Recently Added</option>
        <option value="rating">Highest Rated</option>
        <option value="title">A → Z</option>
      </select>
    </div>
    <div id="media-container"></div>
  </div>
</main>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-heading">Add New Manga</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:1.25rem">
        <label>Cari dari AniList (gambar otomatis)</label>
        <div class="tmdb-wrap">
          <div class="tmdb-row">
            <input class="tmdb-input" id="anilist-search" type="text" placeholder="Ketik judul manga/manhwa..." oninput="onAnilistSearch(this.value)" autocomplete="off">
            <button class="btn" onclick="clearAnilist()" style="padding:.3rem .8rem">✕</button>
          </div>
          <div class="tmdb-dropdown" id="anilist-dd"></div>
        </div>
      </div>

      <div class="add-layout">
        <div class="poster-box" id="poster-box"><div class="poster-ph">?</div></div>
        <div style="flex:1">
          <div class="form-grid">
            <div class="form-group full"><label>Title</label><input type="text" id="f-title"></div>
            <div class="form-group"><label>Type</label><select id="f-type"><option>Manga</option><option>Manhwa</option><option>Manhua</option></select></div>
            <div class="form-group"><label>Year</label><input type="number" id="f-year"></div>
            <div class="form-group"><label>Status</label><select id="f-status"><option value="plan">Plan to Read</option><option value="reading">Reading</option><option value="completed">Completed</option><option value="dropped">Dropped</option></select></div>
            <div class="form-group"><label>Author</label><input type="text" id="f-author"></div>
            <div class="form-group"><label>Genres</label><input type="text" id="f-genre"></div>
            <div class="form-group"><label>Total Chapters</label><input type="number" id="f-chapters"></div>
            <div class="form-group"><label>Current Chapter</label><input type="number" id="f-current-chapter"></div>
            <div class="form-group"><label>Volumes</label><input type="text" id="f-volumes"></div>
            <div class="form-group"><label>Rating</label><div class="star-rating" id="star-rating"><button class="star-btn" data-v="1" onclick="setRating(1)">★</button><button class="star-btn" data-v="2" onclick="setRating(2)">★</button><button class="star-btn" data-v="3" onclick="setRating(3)">★</button><button class="star-btn" data-v="4" onclick="setRating(4)">★</button><button class="star-btn" data-v="5" onclick="setRating(5)">★</button></div></div>
            <div class="form-group full"><label>Notes</label><textarea id="f-notes" rows="2"></textarea></div>
          </div>
        </div>
      </div>
      <input type="hidden" id="f-cover">
      <input type="hidden" id="f-anilist-id">
      <div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="btn-save" onclick="saveEntry()">Save Manga</button></div>
    </div>
  </div>
</div>

<!-- Detail Modal dengan Update Chapter -->
<div class="modal-overlay" id="detail-overlay" onclick="closeDetailOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div style="display:flex;gap:1rem;align-items:flex-start;width:100%">
        <div id="d-poster"></div>
        <div style="flex:1">
          <div class="modal-title" id="d-title"></div>
          <div style="font-size:.8rem;color:var(--text-dim);margin-top:.35rem" id="d-meta"></div>
        </div>
        <button class="modal-close" onclick="closeDetail()">✕</button>
      </div>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_SHEETS = 'https://script.google.com/macros/s/AKfycbw7BjczrAVkCTdumUlXPZbWZLGpbs71O_FjqEkH5K_vCwaQKC1WAuoZ6GHdAG_dUD7M/exec';
const ANILIST_API = 'https://graphql.anilist.co';

let mediaData = [];
let currentRating = 0;
let editingId = null;
let filterSt = 'all';
let filterTy = 'all';
let anilistTimer = null;

function setSyncStatus(status, msg) {
  const dot = document.getElementById('sync-dot');
  const text = document.getElementById('sync-status');
  if (dot) dot.className = 'sync-dot ' + status;
  if (text) text.textContent = msg;
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function apiSheets(body) {
  const res = await fetch(API_SHEETS, { method: 'POST', body: JSON.stringify(body) });
  const text = await res.text();
  try { return JSON.parse(text); } catch(e) { throw new Error('Server error'); }
}

async function loadFromSheets() {
  setSyncStatus('syncing', 'Loading...');
  try {
    const res = await fetch(API_SHEETS + '?action=getAll');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    mediaData = (data.manga || []).map(m => ({
      id: Number(m.id), title: m.title, type: m.type || 'Manga', year: Number(m.year), status: m.status || 'plan',
      genre: m.genre || '', author: m.author || '', chapters: Number(m.chapters) || 0, currentChapter: Number(m.currentChapter) || 0,
      volumes: m.volumes || '', rating: Number(m.rating) || 0, notes: m.notes || '', added: Number(m.added) || Date.now(),
      cover: m.cover || '', anilistId: m.anilistId || ''
    }));
    setSyncStatus('online', 'Synced');
    renderMedia();
  } catch(err) { setSyncStatus('error', 'Error'); }
}

async function searchAnilist(q) {
  const query = `query($search:String){Media(search:$search,type:MANGA){id title{romaji}coverImage{large}startDate{year}chapters volumes genres staff{edges{node{name{full}primaryOccupations}}}}}`;
  try {
    const res = await fetch(ANILIST_API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({query, variables:{search:q}}) });
    const data = await res.json();
    return data.data?.Media || null;
  } catch(e) { return null; }
}

function onAnilistSearch(val) {
  clearTimeout(anilistTimer);
  if (val.length < 2) { document.getElementById('anilist-dd').style.display = 'none'; return; }
  anilistTimer = setTimeout(async () => {
    const manga = await searchAnilist(val);
    const dd = document.getElementById('anilist-dd');
    if (!manga) { dd.style.display = 'none'; return; }
    let author = '';
    if (manga.staff?.edges) {
      const a = manga.staff.edges.find(e => e.node.primaryOccupations?.some(o => o.includes('Author')));
      if (a) author = a.node.name.full;
    }
    dd.innerHTML = `<div class="tmdb-item" onclick="selectManga(this)" data-id="${manga.id}" data-title="${manga.title.romaji}" data-cover="${manga.coverImage?.large||''}" data-year="${manga.startDate?.year||''}" data-chapters="${manga.chapters||''}" data-volumes="${manga.volumes||''}" data-genres="${(manga.genres||[]).slice(0,3).join(', ')}" data-author="${author}">${manga.coverImage?.large?`<img class="tmdb-thumb" src="${manga.coverImage.large}">`:`<div class="tmdb-nothumb">${(manga.title.romaji||'?').charAt(0)}</div>`}<div><div class="tmdb-name">${manga.title.romaji}</div><div class="tmdb-sub">${manga.genres?.slice(0,2).join(', ')||''} · ${manga.chapters||'?'} ch</div></div></div>`;
    dd.style.display = 'block';
  }, 400);
}

function selectManga(el) {
  document.getElementById('f-title').value = el.dataset.title;
  document.getElementById('f-year').value = el.dataset.year;
  document.getElementById('f-chapters').value = el.dataset.chapters;
  document.getElementById('f-volumes').value = el.dataset.volumes;
  document.getElementById('f-genre').value = el.dataset.genres;
  document.getElementById('f-author').value = el.dataset.author;
  document.getElementById('f-cover').value = el.dataset.cover;
  document.getElementById('f-anilist-id').value = el.dataset.id;
  document.getElementById('anilist-search').value = el.dataset.title;
  updateCoverPreview(el.dataset.cover, el.dataset.title);
  document.getElementById('anilist-dd').style.display = 'none';
}

function updateCoverPreview(url, title) {
  const box = document.getElementById('poster-box');
  const letter = (title || '?').charAt(0).toUpperCase();
  if (url) box.innerHTML = `<img class="poster-ph" src="${url}" style="width:90px;height:135px;object-fit:cover" onerror="this.outerHTML='<div class=poster-ph>${letter}</div>';">`;
  else box.innerHTML = `<div class="poster-ph">${letter}</div>`;
}

function clearAnilist() {
  document.getElementById('anilist-search').value = '';
  document.getElementById('f-cover').value = '';
  document.getElementById('anilist-dd').style.display = 'none';
}

async function saveEntry() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { showToast('Enter title', true); return; }
  const entry = {
    id: editingId || Date.now(), title, type: document.getElementById('f-type').value,
    year: parseInt(document.getElementById('f-year').value) || new Date().getFullYear(),
    status: document.getElementById('f-status').value, genre: document.getElementById('f-genre').value || '',
    author: document.getElementById('f-author').value || '', chapters: parseInt(document.getElementById('f-chapters').value) || 0,
    currentChapter: parseInt(document.getElementById('f-current-chapter').value) || 0,
    volumes: document.getElementById('f-volumes').value || '', rating: currentRating,
    notes: document.getElementById('f-notes').value || '', cover: document.getElementById('f-cover').value || '',
    anilistId: document.getElementById('f-anilist-id').value || '', added: editingId ? (mediaData.find(x=>x.id===editingId)?.added||Date.now()) : Date.now()
  };
  setSyncStatus('syncing', 'Saving...');
  try {
    await apiSheets({ action: 'save', manga: entry });
    if (editingId) { const i = mediaData.findIndex(x=>x.id===editingId); if(i>-1) mediaData[i]=entry; }
    else mediaData.push(entry);
    renderMedia(); closeModal(); setSyncStatus('online', 'Saved!'); showToast('Saved!');
  } catch(err) { showToast('Save failed', true); setSyncStatus('error', 'Failed'); }
}

function getFiltered() {
  let data = [...mediaData];
  if (filterSt !== 'all') data = data.filter(x => x.status === filterSt);
  if (filterTy !== 'all') data = data.filter(x => x.type === filterTy);
  const q = document.getElementById('search-input').value.toLowerCase();
  if (q) data = data.filter(x => x.title.toLowerCase().includes(q) || (x.author && x.author.toLowerCase().includes(q)));
  const sort = document.getElementById('sort-select').value;
  if (sort === 'rating') data.sort((a,b) => b.rating - a.rating);
  else if (sort === 'title') data.sort((a,b) => a.title.localeCompare(b.title));
  else data.sort((a,b) => b.added - a.added);
  return data;
}

function renderStars(r) { return [1,2,3,4,5].map(i => `<span class="star${i<=r?' filled':''}">★</span>`).join(''); }

function cardHTML(m) {
  const letter = m.title.charAt(0).toUpperCase();
  const progress = m.chapters ? Math.round((m.currentChapter / m.chapters) * 100) : 0;
  const typeIcon = { Manga:'📘', Manhwa:'📱', Manhua:'📙' }[m.type] || '📘';
  const statusIcon = { reading:'📖', completed:'✅', plan:'📋', dropped:'⛔' }[m.status] || '📚';
  return `<div class="media-card" onclick="showDetail(${m.id})">${m.cover?`<img class="card-poster" src="${m.cover}" onerror="this.style.display='none';">`:''}<div class="poster-placeholder" style="${m.cover?'display:none':'display:flex'}">${letter}</div><div class="card-badge">${statusIcon}</div><div class="card-info"><div class="card-title">${m.title}</div><div class="card-meta">${typeIcon} ${m.type} · ${m.year||'?'}</div><div class="card-meta">📖 ${m.currentChapter}/${m.chapters||'?'}</div>${m.rating?`<div class="star-row">${renderStars(m.rating)}</div>`:''}${progress>0&&progress<100?`<div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>`:''}</div></div>`;
}

function renderMedia() {
  updateStats();
  const data = getFiltered();
  const container = document.getElementById('media-container');
  if (!data.length) { container.innerHTML = '<div class="empty">📭 No manga found<br><small>Add your first manga using the + button</small></div>'; return; }
  container.innerHTML = `<div class="media-grid">${data.map(cardHTML).join('')}</div>`;
}

function updateStats() {
  document.getElementById('stat-total').textContent = mediaData.length;
  document.getElementById('stat-reading').textContent = mediaData.filter(x=>x.status==='reading').length;
  document.getElementById('stat-completed').textContent = mediaData.filter(x=>x.status==='completed').length;
  document.getElementById('stat-plan').textContent = mediaData.filter(x=>x.status==='plan').length;
  document.getElementById('cnt-all').textContent = mediaData.length;
  document.getElementById('cnt-reading').textContent = mediaData.filter(x=>x.status==='reading').length;
  document.getElementById('cnt-completed').textContent = mediaData.filter(x=>x.status==='completed').length;
  document.getElementById('cnt-plan').textContent = mediaData.filter(x=>x.status==='plan').length;
  document.getElementById('cnt-dropped').textContent = mediaData.filter(x=>x.status==='dropped').length;
}

function filterStatus(s) { filterSt = s; renderMedia(); }
function filterType(t) { filterTy = t; renderMedia(); }
function openModal(id) {
  editingId = id || null;
  const m = id ? mediaData.find(x=>x.id===id) : null;
  document.getElementById('modal-heading').textContent = m ? 'Edit Manga' : 'Add New Manga';
  document.getElementById('f-title').value = m?.title || '';
  document.getElementById('f-type').value = m?.type || 'Manga';
  document.getElementById('f-year').value = m?.year || '';
  document.getElementById('f-status').value = m?.status || 'plan';
  document.getElementById('f-genre').value = m?.genre || '';
  document.getElementById('f-author').value = m?.author || '';
  document.getElementById('f-chapters').value = m?.chapters || '';
  document.getElementById('f-current-chapter').value = m?.currentChapter || '';
  document.getElementById('f-volumes').value = m?.volumes || '';
  document.getElementById('f-notes').value = m?.notes || '';
  document.getElementById('f-cover').value = m?.cover || '';
  document.getElementById('f-anilist-id').value = m?.anilistId || '';
  setRating(m?.rating || 0);
  updateCoverPreview(m?.cover, m?.title);
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); editingId = null; }
function closeModalOutside(e) { if(e.target === document.getElementById('modal-overlay')) closeModal(); }
function setRating(v) { currentRating = v; document.querySelectorAll('.star-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.v) <= v)); }

// DETAIL MODAL dengan UPDATE CHAPTER
function showDetail(id) {
  const m = mediaData.find(x => x.id === id);
  if (!m) return;
  const letter = m.title.charAt(0).toUpperCase();
  const typeIcon = { Manga:'📘', Manhwa:'📱', Manhua:'📙' }[m.type] || '📘';
  const statusIcon = { reading:'📖 Reading', completed:'✅ Completed', plan:'📋 Plan to Read', dropped:'⛔ Dropped' }[m.status] || m.status;
  const progress = m.chapters ? Math.round((m.currentChapter / m.chapters) * 100) : 0;
  
  document.getElementById('d-title').innerHTML = `${typeIcon} ${m.title}`;
  document.getElementById('d-meta').innerHTML = `${m.type} · ${m.year || '—'} · ${m.author ? `✍️ ${m.author}` : ''}`;
  document.getElementById('d-poster').innerHTML = m.cover ? `<img class="detail-poster" src="${m.cover}" onerror="this.outerHTML='<div class=detail-poster-ph>${letter}</div>';">` : `<div class="detail-poster-ph">${letter}</div>`;
  
  document.getElementById('detail-body').innerHTML = `
    <div style="display:flex;align-items:flex-end;gap:1rem;margin-bottom:1.5rem">
      ${m.rating ? `<div class="detail-rating-big">${m.rating}.0</div><div>${renderStars(m.rating)}<div style="font-size:.75rem;color:var(--text-dim);margin-top:.25rem">Your rating</div></div>` : '<div style="color:var(--text-dim)">Not yet rated</div>'}
    </div>
    
    <!-- CHAPTER UPDATE SECTION -->
    <div style="background:var(--surface2);border-radius:2px;padding:1rem;margin-bottom:1.5rem">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem">
        <div>
          <div style="font-size:.7rem;color:var(--text-dim);margin-bottom:.25rem">CURRENT PROGRESS</div>
          <div style="font-size:1.5rem;font-weight:500;color:var(--gold)">${m.currentChapter || 0} / ${m.chapters || '?'} chapters</div>
          ${m.chapters ? `<div style="font-size:.75rem;color:var(--text-muted);margin-top:.25rem">${progress}% completed</div>` : ''}
        </div>
        <div class="chapter-control">
          <input type="number" id="quick-chapter-input" class="chapter-input" value="${m.currentChapter || 0}" min="0" max="${m.chapters || 9999}" style="width:100px">
          <button class="update-chapter-btn" onclick="updateChapterQuick(${m.id})">Update Chapter</button>
        </div>
      </div>
      ${m.chapters && progress > 0 ? `<div class="progress-bar" style="margin-top:.75rem"><div class="progress-fill" style="width:${progress}%"></div></div>` : ''}
    </div>
    
    <div style="margin-bottom:1rem">
      <div class="detail-row"><span class="detail-key">Status</span><span class="detail-val" style="color:var(--gold)">${statusIcon}</span></div>
      ${m.author ? `<div class="detail-row"><span class="detail-key">Author / Artist</span><span class="detail-val">${m.author}</span></div>` : ''}
      ${m.genre ? `<div class="detail-row"><span class="detail-key">Genres</span><span class="detail-val">${m.genre}</span></div>` : ''}
      ${m.chapters ? `<div class="detail-row"><span class="detail-key">Total Chapters</span><span class="detail-val">${m.chapters}</span></div>` : ''}
      ${m.volumes ? `<div class="detail-row"><span class="detail-key">Volumes</span><span class="detail-val">${m.volumes}</span></div>` : ''}
    </div>
    
    ${m.notes ? `<div style="background:var(--surface2);border-left:2px solid var(--gold-dim);padding:.75rem 1rem;font-size:.875rem;color:var(--text-muted);line-height:1.6;margin-bottom:1rem"><em>"${m.notes}"</em></div>` : ''}
    
    <div style="display:flex;gap:.75rem;padding-top:.5rem">
      <button class="btn btn-primary" onclick="closeDetail(); openModal(${m.id})">✏️ Edit Details</button>
      <button class="btn" onclick="deleteEntry(${m.id})" style="border-color:rgba(224,85,85,.4);color:var(--red)">🗑️ Delete</button>
    </div>
  `;
  document.getElementById('detail-overlay').classList.add('open');
}

// Quick update chapter function
async function updateChapterQuick(id) {
  const input = document.getElementById('quick-chapter-input');
  const newChapter = parseInt(input.value) || 0;
  const manga = mediaData.find(x => x.id === id);
  if (!manga) return;
  
  const updatedManga = { ...manga, currentChapter: newChapter };
  const idx = mediaData.findIndex(x => x.id === id);
  if (idx !== -1) mediaData[idx] = updatedManga;
  
  setSyncStatus('syncing', 'Updating...');
  try {
    await apiSheets({ action: 'save', manga: updatedManga });
    renderMedia();
    setSyncStatus('online', 'Updated');
    showToast(`Chapter updated to ${newChapter}`);
    // Refresh detail view
    closeDetail();
    showDetail(id);
  } catch (err) {
    showToast('Update failed', true);
    setSyncStatus('error', 'Failed');
  }
}

function closeDetail() { document.getElementById('detail-overlay').classList.remove('open'); }
function closeDetailOutside(e) { if(e.target === document.getElementById('detail-overlay')) closeDetail(); }

async function deleteEntry(id) {
  if (!confirm('Remove this manga?')) return;
  setSyncStatus('syncing', 'Deleting...');
  try {
    await apiSheets({ action: 'delete', id });
    mediaData = mediaData.filter(x => x.id !== id);
    renderMedia();
    closeDetail();
    setSyncStatus('online', 'Deleted');
    showToast('Removed');
  } catch(err) { showToast('Delete failed', true); }
}

document.addEventListener('click', e => { if(!e.target.closest('.tmdb-wrap')) document.getElementById('anilist-dd').style.display = 'none'; });
loadFromSheets();
</script>
</body>
</html>
