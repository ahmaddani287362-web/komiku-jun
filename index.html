<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Komik JUN — Modern Comic Tracker</title>
    <!-- Google Fonts + Tailwind CSS + Font Awesome + Framer Motion CDN -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom Tailwind Config Override -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'scale-up': 'scaleUp 0.2s ease-out',
                        'skeleton': 'skeletonPulse 1.5s infinite',
                    },
                    keyframes: {
                        fadeIn: { from: { opacity: 0 }, to: { opacity: 1 } },
                        scaleUp: { from: { transform: 'scale(0.95)' }, to: { transform: 'scale(1)' } },
                        skeletonPulse: { '0%, 100%': { opacity: 0.3 }, '50%': { opacity: 0.6 } }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom glassmorphism & scrollbar */
        body {
            background: linear-gradient(135deg, #0f0f12 0%, #18181b 100%);
            font-feature-settings: "ss02", "cv02", "cv05";
        }
        .glass-nav {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(63, 63, 70, 0.5);
        }
        .glass-card {
            background: rgba(30, 30, 35, 0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(63, 63, 70, 0.4);
            transition: all 0.2s ease;
        }
        .glass-card:hover {
            background: rgba(39, 39, 45, 0.8);
            border-color: rgba(201, 168, 76, 0.3);
            transform: translateY(-4px);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #27272a;
        }
        ::-webkit-scrollbar-thumb {
            background: #52525b;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #71717a;
        }
        /* Card image fixed ratio */
        .card-img {
            aspect-ratio: 2 / 3;
            object-fit: cover;
            width: 100%;
            transition: transform 0.3s ease;
        }
        .hover-overlay {
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .media-card:hover .hover-overlay {
            opacity: 1;
        }
        /* skeleton loading */
        .skeleton-card {
            background: linear-gradient(90deg, #27272a 25%, #3f3f46 50%, #27272a 75%);
            background-size: 200% 100%;
            animation: skeletonPulse 1.5s infinite;
        }
        @keyframes skeletonPulse {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        /* Chapter update pop effect */
        .toast-success {
            animation: slideUp 0.3s ease-out forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        /* Mobile grid adjustment */
        @media (max-width: 640px) {
            .media-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
                gap: 0.75rem !important;
            }
        }
        @media (min-width: 1024px) {
            .media-grid {
                grid-template-columns: repeat(5, minmax(0, 1fr)) !important;
            }
        }
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1.25rem;
        }
        /* Command palette style search */
        .search-input:focus {
            box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.3);
        }
    </style>
</head>
<body class="dark text-white font-sans antialiased">

    <!-- NAVBAR with Glassmorphism -->
    <nav class="glass-nav sticky top-0 z-50 px-4 md:px-8 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-book-open text-2xl text-amber-500"></i>
            <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-amber-400 to-amber-600 bg-clip-text text-transparent">Komik<span class="text-white">JUN</span></span>
        </div>
        <div class="hidden md:flex items-center gap-6 text-zinc-400 text-sm">
            <button class="hover:text-amber-400 transition" onclick="filterStatus('all')">Dashboard</button>
            <button class="hover:text-amber-400 transition" onclick="filterStatus('reading')">Reading</button>
            <button class="hover:text-amber-400 transition" onclick="filterStatus('completed')">Completed</button>
            <button class="hover:text-amber-400 transition" onclick="filterStatus('plan')">Planning</button>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="loadFromSheets()" class="text-zinc-400 hover:text-white transition p-2 rounded-full"><i class="fa-solid fa-rotate-right"></i></button>
            <button onclick="openModal()" class="bg-amber-600 hover:bg-amber-500 px-4 py-1.5 rounded-lg text-sm font-medium transition shadow-lg shadow-amber-900/20">+ Add Manga</button>
        </div>
    </nav>

    <!-- HERO & STATS Bento Section -->
    <div class="max-w-7xl mx-auto px-4 md:px-8 pt-8 pb-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="glass-card rounded-2xl p-5">
                <div class="flex justify-between items-start">
                    <div><p class="text-zinc-400 text-sm uppercase tracking-wide">Total</p><p class="text-3xl font-bold mt-1" id="stat-total">0</p></div>
                    <i class="fa-solid fa-layer-group text-amber-500 text-xl"></i>
                </div>
                <div class="mt-2 text-xs text-zinc-500">Manga & Manhwa</div>
            </div>
            <div class="glass-card rounded-2xl p-5">
                <div class="flex justify-between items-start">
                    <div><p class="text-zinc-400 text-sm uppercase tracking-wide">Reading</p><p class="text-3xl font-bold mt-1" id="stat-reading">0</p></div>
                    <i class="fa-solid fa-eye text-sky-500 text-xl"></i>
                </div>
                <div class="mt-2 text-xs text-zinc-500">Currently active</div>
            </div>
            <div class="glass-card rounded-2xl p-5">
                <div class="flex justify-between items-start">
                    <div><p class="text-zinc-400 text-sm uppercase tracking-wide">Completed</p><p class="text-3xl font-bold mt-1" id="stat-completed">0</p></div>
                    <i class="fa-solid fa-circle-check text-emerald-500 text-xl"></i>
                </div>
                <div class="mt-2 text-xs text-zinc-500">Finished series</div>
            </div>
            <div class="glass-card rounded-2xl p-5">
                <div class="flex justify-between items-start">
                    <div><p class="text-zinc-400 text-sm uppercase tracking-wide">Plan to Read</p><p class="text-3xl font-bold mt-1" id="stat-plan">0</p></div>
                    <i class="fa-solid fa-calendar-week text-purple-500 text-xl"></i>
                </div>
                <div class="mt-2 text-xs text-zinc-500">Watchlist</div>
            </div>
        </div>

        <!-- Search Bar with CMD+K style -->
        <div class="mt-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
            <div class="relative w-full md:w-96">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 text-sm"></i>
                <input type="text" id="search-input" oninput="renderMedia()" placeholder="Search titles, authors, genres..." class="search-input w-full bg-zinc-900/60 border border-zinc-800 rounded-xl py-2.5 pl-10 pr-4 text-sm text-white placeholder:text-zinc-500 focus:outline-none focus:border-amber-500/50 transition">
                <div class="absolute right-3 top-1/2 -translate-y-1/2 hidden md:flex gap-1 text-[10px] text-zinc-600"><kbd class="px-1 bg-zinc-800 rounded">⌘</kbd><kbd class="px-1 bg-zinc-800 rounded">K</kbd></div>
            </div>
            <div class="flex flex-wrap gap-2">
                <div class="flex bg-zinc-900/50 rounded-xl p-1 gap-1 border border-zinc-800">
                    <button data-filter="all" onclick="filterStatus('all')" class="chip-status px-4 py-1.5 text-sm rounded-lg transition-all text-zinc-300 hover:bg-zinc-800">All</button>
                    <button data-filter="reading" onclick="filterStatus('reading')" class="chip-status px-4 py-1.5 text-sm rounded-lg transition-all text-zinc-300 hover:bg-zinc-800">Reading</button>
                    <button data-filter="completed" onclick="filterStatus('completed')" class="chip-status px-4 py-1.5 text-sm rounded-lg transition-all text-zinc-300 hover:bg-zinc-800">Completed</button>
                    <button data-filter="plan" onclick="filterStatus('plan')" class="chip-status px-4 py-1.5 text-sm rounded-lg transition-all text-zinc-300 hover:bg-zinc-800">Planning</button>
                </div>
                <select id="sort-select" onchange="renderMedia()" class="bg-zinc-900/80 border border-zinc-800 rounded-xl px-4 py-1.5 text-sm text-zinc-300 focus:outline-none">
                    <option value="added">Recently Added</option>
                    <option value="rating">Highest Rated</option>
                    <option value="title">A → Z</option>
                </select>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT GRID -->
    <main class="max-w-7xl mx-auto px-4 md:px-8 py-8">
        <div id="media-container" class="media-grid transition-all duration-300"></div>
    </main>

    <!-- MODAL (Add/Edit) same functional but minimalist style -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="bg-zinc-900 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto border border-zinc-800 shadow-2xl">
            <div class="sticky top-0 bg-zinc-900/90 backdrop-blur p-5 border-b border-zinc-800 flex justify-between items-center">
                <h2 class="text-xl font-semibold" id="modal-heading">Add New Manga</h2>
                <button onclick="closeModal()" class="text-zinc-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6 space-y-5">
                <div><label class="text-xs uppercase text-zinc-500 font-semibold block mb-1">Search from MyAnimeList</label><div class="relative"><input type="text" id="mal-search" placeholder="Type title..." oninput="onMalSearch(this.value)" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 text-sm"><div id="mal-dd" class="absolute left-0 right-0 top-full mt-1 bg-zinc-800 rounded-xl border border-zinc-700 max-h-60 overflow-auto z-50 hidden"></div></div></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="text-xs uppercase text-zinc-500">Title *</label><input type="text" id="f-title" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 text-sm"></div>
                    <div><label class="text-xs uppercase text-zinc-500">Type</label><select id="f-type" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 text-sm"><option>Manga</option><option>Manhwa</option><option>Manhua</option></select></div>
                    <div><label class="text-xs uppercase text-zinc-500">Year</label><input type="number" id="f-year" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 text-sm"></div>
                    <div><label class="text-xs uppercase text-zinc-500">Status</label><select id="f-status" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 text-sm"><option value="plan">📋 Plan to Read</option><option value="reading">📖 Reading</option><option value="completed">✅ Completed</option><option value="dropped">⛔ Dropped</option></select></div>
                    <div><label class="text-xs uppercase text-zinc-500">Author</label><input id="f-author" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 text-sm"></div>
                    <div><label class="text-xs uppercase text-zinc-500">Genres</label><input id="f-genre" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 text-sm"></div>
                    <div><label class="text-xs uppercase text-zinc-500">Total Chapters</label><input type="number" id="f-chapters" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 text-sm"></div>
                    <div><label class="text-xs uppercase text-zinc-500">Current Chapter</label><input type="number" id="f-current-chapter" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 text-sm"></div>
                    <div><label class="text-xs uppercase text-zinc-500">URL / Link Baca</label><input type="url" id="f-url" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 text-sm"></div>
                    <div><label class="text-xs uppercase text-zinc-500">Cover URL</label><input type="url" id="f-cover" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 text-sm"><div class="flex gap-2 mt-2"><button onclick="searchGoogleCover()" class="text-xs bg-zinc-700 px-3 py-1 rounded-lg">🔍 Google Images</button><button onclick="uploadCoverFile()" class="text-xs bg-zinc-700 px-3 py-1 rounded-lg">📤 Upload</button></div></div>
                    <div class="md:col-span-2"><label class="text-xs uppercase text-zinc-500">Rating</label><div id="star-rating" class="flex gap-1 text-2xl"><span class="star-btn cursor-pointer" data-v="1">★</span><span class="star-btn cursor-pointer" data-v="2">★</span><span class="star-btn cursor-pointer" data-v="3">★</span><span class="star-btn cursor-pointer" data-v="4">★</span><span class="star-btn cursor-pointer" data-v="5">★</span></div></div>
                    <div class="md:col-span-2"><label class="text-xs uppercase text-zinc-500">Notes</label><textarea id="f-notes" rows="2" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 text-sm"></textarea></div>
                </div>
                <input type="hidden" id="f-mal-id">
                <div class="flex justify-end gap-3 pt-2"><button onclick="closeModal()" class="px-4 py-2 rounded-xl border border-zinc-700">Cancel</button><button onclick="saveEntry()" class="px-6 py-2 bg-amber-600 hover:bg-amber-500 rounded-xl font-semibold transition">Save Manga</button></div>
            </div>
        </div>
    </div>

    <!-- DETAIL MODAL -->
    <div id="detail-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="bg-zinc-900 rounded-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto border border-zinc-800">
            <div class="sticky top-0 bg-zinc-900/90 backdrop-blur p-5 border-b border-zinc-800 flex justify-between items-center">
                <h2 id="d-title" class="text-xl font-semibold"></h2>
                <button onclick="closeDetail()" class="text-zinc-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-5" id="detail-body"></div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-800 border border-amber-600/40 text-amber-400 text-sm px-5 py-2 rounded-full shadow-xl z-[200] opacity-0 transition-all duration-300 pointer-events-none"></div>

    <!-- LOADING SKELETON -->
    <div id="skeleton-container" class="media-grid hidden">
        <!-- skeletons will be inserted via js -->
    </div>

    <script>
        // ==================== GLOBAL STATE ====================
        const WORKER_URL = 'https://manga-proxy.ahmaddani287362.workers.dev';
        const JIKAN_API = 'https://api.jikan.moe/v4/manga?q=';
        const IMGBB_API_KEY = '89d9234558a47498b21ca8d0cefdb157';
        let mediaData = [], currentRating = 0, editingId = null, filterSt = 'all', filterTy = 'all', filterGenre = 'all', viewMode = 'grid', isSaving = false, malTimer = null;

        // Helper functions (same as original but improved UI)
        function escapeHtml(str){ if(!str) return ''; return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}
        function formatDate(timestamp){ if(!timestamp) return 'Belum pernah'; const d=new Date(Number(timestamp)); return d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});}
        function showToast(msg,isError){ const t=document.getElementById('toast'); t.innerHTML=msg; t.classList.add('opacity-100','translate-y-0'); setTimeout(()=>t.classList.remove('opacity-100','translate-y-0'),2500);}
        function setSyncStatus(status,msg){ const dot=document.getElementById('sync-dot'); const txt=document.getElementById('sync-status'); if(dot) dot.className='sync-dot '+status; if(txt) txt.textContent=msg;}
        
        // Load & Save Core
        async function loadFromSheets(){ 
            document.getElementById('skeleton-container')?.classList.remove('hidden'); 
            try{ const res=await fetch(WORKER_URL); const data=await res.json(); mediaData=(data.manga||[]).map(m=>({ id:Number(m.id), title:m.title, type:m.type||'Manga', year:Number(m.year), status:m.status||'plan', genre:m.genre||'', author:m.author||'', chapters:m.chapters||'', currentChapter:Number(m.currentChapter), volumes:m.volumes||'', rating:Number(m.rating), notes:m.notes||'', added:Number(m.added)||Date.now(), cover:m.cover||'', malId:m.malId||'', url:m.url||'', lastRead:m.lastRead?Number(m.lastRead):'', lastEdited:m.lastEdited?Number(m.lastEdited):'' })); localStorage.setItem('mangaTracker',JSON.stringify(mediaData)); renderMedia(); showToast('Synced from cloud'); } catch(e){ const saved=localStorage.getItem('mangaTracker'); if(saved) mediaData=JSON.parse(saved); renderMedia(); showToast('Offline mode',true); } finally{ document.getElementById('skeleton-container')?.classList.add('hidden'); } }
        async function saveEntry(){ if(isSaving) return; const title=document.getElementById('f-title').value.trim(); if(!title){ showToast('Enter title',true); return; } const now=Date.now(); const entry={ id:editingId||now, title, type:document.getElementById('f-type').value, year:parseInt(document.getElementById('f-year').value)||new Date().getFullYear(), status:document.getElementById('f-status').value, genre:document.getElementById('f-genre').value||'', author:document.getElementById('f-author').value||'', chapters:document.getElementById('f-chapters').value||'', currentChapter:parseInt(document.getElementById('f-current-chapter').value)||0, volumes:'', rating:currentRating, notes:document.getElementById('f-notes').value||'', cover:document.getElementById('f-cover').value||'', malId:document.getElementById('f-mal-id').value||'', url:document.getElementById('f-url').value||'', added:editingId? (mediaData.find(x=>x.id===editingId)?.added||now):now, lastRead:editingId? (mediaData.find(x=>x.id===editingId)?.lastRead||''):'', lastEdited:now }; isSaving=true; const btn=document.getElementById('btn-save'); if(btn) btn.disabled=true; try{ await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'save',manga:entry})}); if(editingId){ const idx=mediaData.findIndex(x=>x.id===editingId); if(idx>-1) mediaData[idx]=entry; }else mediaData.push(entry); localStorage.setItem('mangaTracker',JSON.stringify(mediaData)); renderMedia(); closeModal(); showToast(editingId?'Updated!':'Added!'); } catch(err){ showToast('Save failed',true); } finally{ isSaving=false; if(btn) btn.disabled=false; } }
        async function deleteEntry(id){ if(!confirm('Remove?')) return; try{ await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'delete',id:id})}); mediaData=mediaData.filter(x=>x.id!==id); localStorage.setItem('mangaTracker',JSON.stringify(mediaData)); renderMedia(); closeDetail(); showToast('Deleted'); } catch(e){ showToast('Delete failed',true); } }
        async function updateChapterDirect(id){ const input=document.getElementById('quick-chapter-input'); const newChapter=parseInt(input.value)||0; const manga=mediaData.find(x=>x.id===id); if(!manga) return; const now=Date.now(); const updatedManga={...manga,currentChapter:newChapter,lastRead:now,lastEdited:now}; const idx=mediaData.findIndex(x=>x.id===id); if(idx!==-1) mediaData[idx]=updatedManga; try{ await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'save',manga:updatedManga})}); localStorage.setItem('mangaTracker',JSON.stringify(mediaData)); renderMedia(); closeDetail(); showDetail(id); showToast(`Chapter ${newChapter}`); } catch(e){ showToast('Update failed',true); } }
        
        // UI Rendering with modern card, progress bar & hover overlay
        function renderMedia(){ updateStats(); updateGenreCloud(); const data=getFiltered(); const container=document.getElementById('media-container'); if(!data.length){ container.innerHTML='<div class="col-span-full text-center py-16 text-zinc-500"><i class="fa-regular fa-folder-open text-4xl mb-3 block"></i>No manga found<br>Click + Add Manga</div>'; return; } container.innerHTML=data.map(m=>{ const progress=parseInt(m.chapters)? Math.round((m.currentChapter/parseInt(m.chapters))*100):0; const chapterText=(m.currentChapter&&m.chapters)?`${m.currentChapter}/${m.chapters}`: (m.currentChapter?`${m.currentChapter}`:''); return `<div class="media-card glass-card rounded-xl overflow-hidden cursor-pointer group relative transition-all duration-200" onclick="showDetail(${m.id})"><div class="relative overflow-hidden"><img src="${m.cover||'https://placehold.co/300x450/1e1e24/52525b?text=No+Cover'}" class="card-img" onerror="this.src='https://placehold.co/300x450/1e1e24/52525b?text=No+Cover'"><div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-200 flex flex-col justify-end p-3"><div class="flex gap-2"><button class="bg-amber-600 text-xs px-2 py-1 rounded-md" onclick="event.stopPropagation(); openModal(${m.id})"><i class="fa-regular fa-pen-to-square"></i> Edit</button><button class="bg-sky-600 text-xs px-2 py-1 rounded-md" onclick="event.stopPropagation(); updateChapterQuickUI(${m.id})"><i class="fa-solid fa-plus"></i> +1</button><button class="bg-emerald-600 text-xs px-2 py-1 rounded-md" onclick="event.stopPropagation(); rateQuick(${m.id})"><i class="fa-regular fa-star"></i> Rate</button></div></div></div><div class="p-3"><div class="font-semibold text-sm line-clamp-1">${escapeHtml(m.title)}</div><div class="text-xs text-zinc-400 mt-1">${m.type} • ${m.year||'?'}</div>${chapterText?`<div class="text-xs text-amber-400 mt-1">📖 ${chapterText}</div>`:''}<div class="mt-2"><div class="h-1 w-full bg-zinc-800 rounded-full overflow-hidden"><div class="h-full bg-amber-500 rounded-full" style="width:${progress}%"></div></div></div><div class="flex justify-between mt-1"><span class="text-[11px] text-zinc-500">${progress}%</span><span class="text-[11px] text-amber-400">${m.rating? '★'.repeat(m.rating):'☆'}</span></div></div></div>` }).join(''); }
        
        function updateStats(){ document.getElementById('stat-total').innerText=mediaData.length; document.getElementById('stat-reading').innerText=mediaData.filter(x=>x.status==='reading').length; document.getElementById('stat-completed').innerText=mediaData.filter(x=>x.status==='completed').length; document.getElementById('stat-plan').innerText=mediaData.filter(x=>x.status==='plan').length; }
        function getFiltered(){ let data=[...mediaData]; if(filterSt!=='all') data=data.filter(x=>x.status===filterSt); const q=document.getElementById('search-input').value.toLowerCase(); if(q) data=data.filter(x=>x.title.toLowerCase().includes(q)||x.author?.toLowerCase().includes(q)); const sort=document.getElementById('sort-select').value; if(sort==='rating') data.sort((a,b)=>b.rating-a.rating); else if(sort==='title') data.sort((a,b)=>a.title.localeCompare(b.title)); else data.sort((a,b)=>b.added-a.added); return data; }
        function filterStatus(s){ filterSt=s; renderMedia(); document.querySelectorAll('.chip-status').forEach(btn=>btn.classList.remove('bg-amber-600/20','text-amber-400','border','border-amber-500/30')); const activeBtn=document.querySelector(`.chip-status[onclick="filterStatus('${s}')"]`); if(activeBtn) activeBtn.classList.add('bg-amber-600/20','text-amber-400','border','border-amber-500/30'); }
        function updateGenreCloud(){ const genres=new Set(); mediaData.forEach(m=>{ if(m.genre) m.genre.split(',').forEach(g=>genres.add(g.trim())); }); document.getElementById('genre-cloud').innerHTML=[...genres].slice(0,12).map(g=>`<button class="genre-tag text-xs bg-zinc-800 hover:bg-zinc-700 px-3 py-1 rounded-full transition" onclick="filterGenre('${g}')">${g}</button>`).join(''); }
        function filterGenre(g){ filterGenre=g; renderMedia(); }
        function openModal(id){ editingId=id||null; currentRating=0; const m=id?mediaData.find(x=>x.id===id):null; document.getElementById('modal-heading').innerText=m?'Edit Manga':'Add Manga'; if(m){ document.getElementById('f-title').value=m.title; document.getElementById('f-type').value=m.type; document.getElementById('f-year').value=m.year; document.getElementById('f-status').value=m.status; document.getElementById('f-genre').value=m.genre; document.getElementById('f-author').value=m.author; document.getElementById('f-chapters').value=m.chapters; document.getElementById('f-current-chapter').value=m.currentChapter; document.getElementById('f-url').value=m.url||''; document.getElementById('f-cover').value=m.cover||''; document.getElementById('f-notes').value=m.notes||''; document.getElementById('f-mal-id').value=m.malId||''; setRating(m.rating); }else{ document.querySelectorAll('#modal-overlay input, #modal-overlay textarea, #modal-overlay select').forEach(el=>el.value=''); setRating(0); } document.getElementById('modal-overlay').classList.remove('opacity-0','pointer-events-none'); document.getElementById('modal-overlay').classList.add('opacity-100','pointer-events-auto'); }
        function closeModal(){ document.getElementById('modal-overlay').classList.add('opacity-0','pointer-events-none'); document.getElementById('modal-overlay').classList.remove('opacity-100','pointer-events-auto'); editingId=null; }
        function setRating(v){ currentRating=v; document.querySelectorAll('.star-btn').forEach((btn,i)=>{ if(i<v) btn.classList.add('text-amber-400'); else btn.classList.remove('text-amber-400'); }); }
        function showDetail(id){ const m=mediaData.find(x=>x.id===id); if(!m) return; const progress=parseInt(m.chapters)? Math.round((m.currentChapter/parseInt(m.chapters))*100):0; document.getElementById('d-title').innerHTML=`${m.title}`; document.getElementById('detail-body').innerHTML=`<div class="flex gap-4"><img src="${m.cover||'https://placehold.co/100x150/1e1e24/52525b'}" class="w-24 h-36 object-cover rounded-xl" onerror="this.src='https://placehold.co/100x150/1e1e24/52525b'"><div class="flex-1"><div class="text-zinc-400 text-sm">${m.type} • ${m.year||'?'}</div><div class="text-amber-400 text-2xl font-bold mt-1">${m.rating||'?'}/5</div><div class="text-sm mt-2">${m.author?`✍️ ${escapeHtml(m.author)}`:''}</div>${m.url?`<div class="mt-2"><a href="${escapeHtml(m.url)}" target="_blank" class="text-amber-400 text-sm"><i class="fa-regular fa-link"></i> Read Online</a></div>`:''}</div></div><div class="mt-4 bg-zinc-800/50 rounded-xl p-3"><div class="flex justify-between items-center"><div><span class="text-xs text-zinc-400">PROGRESS</span><div class="text-lg font-semibold">${m.currentChapter} / ${m.chapters||'?'}</div></div><div class="flex gap-2"><input type="number" id="quick-chapter-input" class="w-20 bg-zinc-800 border border-zinc-700 rounded-lg px-2 py-1 text-center" value="${m.currentChapter}"><button class="bg-amber-600 px-3 py-1 rounded-lg text-sm" onclick="updateChapterDirect(${m.id})">Update</button></div></div><div class="h-1.5 w-full bg-zinc-700 rounded-full mt-2"><div class="h-full bg-amber-500 rounded-full" style="width:${progress}%"></div></div></div><div class="mt-4 text-sm text-zinc-300">${escapeHtml(m.notes)||'No notes'}</div><div class="grid grid-cols-2 gap-3 mt-5"><button class="bg-amber-600 py-2 rounded-xl" onclick="closeDetail(); openModal(${m.id})">✏️ Edit</button><button class="bg-red-700/50 border border-red-700 py-2 rounded-xl" onclick="deleteEntry(${m.id})">🗑️ Delete</button></div>`; document.getElementById('detail-overlay').classList.remove('opacity-0','pointer-events-none'); document.getElementById('detail-overlay').classList.add('opacity-100','pointer-events-auto'); }
        function closeDetail(){ document.getElementById('detail-overlay').classList.add('opacity-0','pointer-events-none'); document.getElementById('detail-overlay').classList.remove('opacity-100','pointer-events-auto'); }
        async function updateChapterQuickUI(id){ const manga=mediaData.find(x=>x.id===id); if(!manga) return; const newChapter=manga.currentChapter+1; const now=Date.now(); const updatedManga={...manga,currentChapter:newChapter,lastRead:now,lastEdited:now}; const idx=mediaData.findIndex(x=>x.id===id); if(idx!==-1) mediaData[idx]=updatedManga; try{ await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'save',manga:updatedManga})}); localStorage.setItem('mangaTracker',JSON.stringify(mediaData)); renderMedia(); showToast(`+1 Chapter: ${newChapter}`); } catch(e){ showToast('Update failed',true); } }
        async function rateQuick(id){ const newRating=prompt('Rate 1-5 stars:',mediaData.find(x=>x.id===id)?.rating); if(newRating && newRating>=1 && newRating<=5){ const manga=mediaData.find(x=>x.id===id); const updatedManga={...manga,rating:parseInt(newRating),lastEdited:Date.now()}; const idx=mediaData.findIndex(x=>x.id===id); if(idx!==-1) mediaData[idx]=updatedManga; try{ await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'save',manga:updatedManga})}); localStorage.setItem('mangaTracker',JSON.stringify(mediaData)); renderMedia(); showToast(`Rating ${newRating}⭐`); } catch(e){ showToast('Failed',true); } } }
        
        // Search / Imports
        async function searchMal(q){ try{ const res=await fetch(`${JIKAN_API}${encodeURIComponent(q)}&limit=5`); const data=await res.json(); if(!data.data) return []; return data.data.map(item=>({ title:item.title_english||item.title, year:item.published?.prop?.from?.year||'', cover:item.images?.jpg?.large_image_url||'', malId:item.mal_id, chapters:item.chapters||'', author:item.authors?.[0]?.name||'', genres:item.genres?.map(g=>g.name).slice(0,2).join(', ')||'' })); }catch(e){ return[]; } }
        function onMalSearch(val){ clearTimeout(malTimer); if(val.length<2){ document.getElementById('mal-dd').style.display='none'; return; } malTimer=setTimeout(async()=>{ const res=await searchMal(val); const dd=document.getElementById('mal-dd'); if(!res.length){ dd.style.display='none'; return; } dd.innerHTML=res.map(r=>`<div class="p-3 hover:bg-zinc-700 cursor-pointer border-b border-zinc-700" onclick="selectMalResult(this)" data-title="${r.title}" data-year="${r.year}" data-cover="${r.cover}" data-malid="${r.malId}" data-chapters="${r.chapters}" data-author="${escapeHtml(r.author)}" data-genres="${escapeHtml(r.genres)}"><div class="font-medium">${r.title}</div><div class="text-xs text-zinc-400">${r.genres} • ${r.year}</div></div>`).join(''); dd.style.display='block'; },300); }
        function selectMalResult(el){ document.getElementById('f-title').value=el.dataset.title; document.getElementById('f-year').value=el.dataset.year; document.getElementById('f-chapters').value=el.dataset.chapters; document.getElementById('f-author').value=el.dataset.author; document.getElementById('f-genre').value=el.dataset.genres; document.getElementById('f-cover').value=el.dataset.cover; document.getElementById('f-mal-id').value=el.dataset.malid; document.getElementById('mal-search').value=el.dataset.title; document.getElementById('mal-dd').style.display='none'; updatePosterPreview(el.dataset.cover,el.dataset.title); }
        function updatePosterPreview(url,title){ const box=document.getElementById('poster-box'); if(box){ if(url) box.innerHTML=`<img src="${url}" class="w-20 h-28 object-cover rounded-lg">`; else box.innerHTML=`<div class="w-20 h-28 bg-zinc-800 rounded-lg flex items-center justify-center text-2xl">${(title?.charAt(0)||'?').toUpperCase()}</div>`; } }
        function clearMal(){ document.getElementById('mal-search').value=''; document.getElementById('f-cover').value=''; document.getElementById('mal-dd').style.display='none'; updatePosterPreview('',document.getElementById('f-title').value); }
        function searchGoogleCover(){ const title=document.getElementById('f-title').value.trim(); if(title) window.open(`https://www.google.com/search?q=${encodeURIComponent(title+' manga cover')}&tbm=isch`,'_blank'); else showToast('Enter title first',true); }
        async function uploadCoverFile(){ const input=document.createElement('input'); input.type='file'; input.accept='image/*'; input.onchange=async(e)=>{ const file=e.target.files[0]; if(!file) return; const fd=new FormData(); fd.append('image',file); showToast('Uploading...'); try{ const res=await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,{method:'POST',body:fd}); const data=await res.json(); if(data.success){ document.getElementById('f-cover').value=data.data.url; updatePosterPreview(data.data.url,document.getElementById('f-title').value); showToast('Cover uploaded'); } else throw new Error(); } catch(e){ showToast('Upload failed',true); } }; input.click(); }
        function exportData(){ if(!mediaData.length){ showToast('No data',true); return; } const dataStr=JSON.stringify({version:'1.0',exportedAt:new Date().toISOString(),total:mediaData.length,manga:mediaData}); const blob=new Blob([dataStr],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`komik-tracker-${Date.now()}.json`; a.click(); URL.revokeObjectURL(a.href); showToast('Exported'); }
        function triggerImport(){ const input=document.createElement('input'); input.type='file'; input.accept='.json'; input.onchange=async(e)=>{ const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=async(ev)=>{ try{ const imported=JSON.parse(ev.target.result); let newList=imported.manga||imported; if(!confirm(`Import ${newList.length} items?`)) return; for(const m of newList){ await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'save',manga:{ id:m.id||Date.now(), title:m.title, type:m.type||'Manga', year:m.year||2024, status:m.status||'plan', genre:m.genre||'', author:m.author||'', chapters:m.chapters||'', currentChapter:m.currentChapter||0, rating:m.rating||0, notes:m.notes||'', cover:m.cover||'', url:m.url||'', added:m.added||Date.now() }})}); } await loadFromSheets(); showToast('Import complete'); } catch(e){ showToast('Invalid file',true); } }; reader.readAsText(file); }; input.click(); }
        
        // Event listeners & initial load
        document.addEventListener('click',e=>{ if(!e.target.closest('.tmdb-wrap') && !e.target.closest('#mal-search')) document.getElementById('mal-dd').style.display='none'; });
        window.loadFromSheets=loadFromSheets; window.saveEntry=saveEntry; window.deleteEntry=deleteEntry; window.openModal=openModal; window.closeModal=closeModal; window.showDetail=showDetail; window.closeDetail=closeDetail; window.filterStatus=filterStatus; window.updateChapterDirect=updateChapterDirect; window.updateChapterQuickUI=updateChapterQuickUI; window.rateQuick=rateQuick; window.exportData=exportData; window.triggerImport=triggerImport; window.onMalSearch=onMalSearch; window.selectMalResult=selectMalResult; window.clearMal=clearMal; window.searchGoogleCover=searchGoogleCover; window.uploadCoverFile=uploadCoverFile; window.setRating=setRating; window.filterGenre=filterGenre;
        
        loadFromSheets();
    </script>
</body>
</html>
