<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga Track</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--gold:#C9A84C;--bg:#0A0A0C;--surface:#111116;--border:#2A2A35;--text:#F0EEE8;--text-dim:#55546A;--red:#E05555;--green:#5EC47A;--blue:#5B8DEF;--purple:#9B6BF0;--serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif}
  body{background:var(--bg);color:var(--text);font-family:var(--sans)}
  .sync-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.3rem 1rem;display:flex;gap:.5rem;font-size:.7rem}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:gray}
  .sync-dot.online{background:var(--green)}
  .sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.3}}
  header{position:sticky;top:0;background:rgba(10,10,12,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1rem;height:60px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-family:var(--serif);font-size:1.4rem;font-weight:300;letter-spacing:.2em;color:var(--gold)}
  .btn{font-size:.7rem;padding:.4rem .8rem;border-radius:4px;border:1px solid var(--border);background:transparent;color:gray;cursor:pointer}
  .btn-primary{background:var(--gold);border-color:var(--gold);color:#000}
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
  .stat-item{background:var(--surface);padding:.8rem;text-align:center;cursor:pointer}
  .stat-label{font-size:.6rem;color:gray}
  .stat-value{font-size:1.3rem;font-weight:300}
  main{display:grid;grid-template-columns:240px 1fr}
  aside{background:var(--surface);border-right:1px solid var(--border);padding:1rem;height:calc(100vh - 60px);overflow-y:auto}
  .sidebar-title{font-size:.6rem;color:gray;border-bottom:1px solid var(--border);padding-bottom:.3rem;margin:.5rem 0}
  .nav-item{display:flex;align-items:center;gap:.5rem;padding:.4rem .5rem;cursor:pointer;color:gray;font-size:.8rem;border-radius:4px}
  .nav-item.active{background:rgba(201,168,76,.1);color:var(--gold)}
  .nav-count{margin-left:auto;font-size:.6rem;background:rgba(255,255,255,.1);padding:.1rem .3rem;border-radius:20px}
  .genre-tag{font-size:.6rem;padding:.2rem .5rem;border-radius:16px;border:1px solid var(--border);background:transparent;color:gray;cursor:pointer;margin:.1rem}
  .genre-tag.active{border-color:var(--gold);color:var(--gold)}
  .content{padding:1rem}
  .section-title{font-family:var(--serif);font-size:1.2rem;margin-bottom:1rem}
  .search-row{display:flex;gap:.5rem;margin-bottom:1rem}
  .search-wrap{flex:1;position:relative}
  .search-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.4rem .8rem .4rem 2rem;border-radius:6px}
  .search-icon{position:absolute;left:.6rem;top:50%;transform:translateY(-50%)}
  select{padding:.4rem;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px}
  .media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.8rem}
  .media-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer}
  .card-poster{width:100%;aspect-ratio:2/3;object-fit:cover}
  .poster-placeholder{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:#1a1a1a;font-size:2rem}
  .status-badge{position:absolute;top:.3rem;right:.3rem;font-size:.6rem;padding:.2rem .4rem;border-radius:20px;background:#000}
  .status-badge.reading{background:var(--blue)}
  .status-badge.completed{background:var(--green)}
  .status-badge.plan{background:var(--purple)}
  .media-card{position:relative}
  .card-info{padding:.5rem}
  .card-title{font-size:.7rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-meta{font-size:.6rem;color:gray}
  .star-row{display:flex;gap:.1rem;margin-top:.2rem}
  .star{font-size:.6rem;color:gray}.star.filled{color:var(--gold)}
  .progress-bar{height:2px;background:gray;margin-top:.3rem}
  .progress-fill{height:100%;background:var(--gold)}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:90%;max-width:500px;max-height:85vh;overflow-y:auto}
  .modal-header{padding:1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
  .modal-body{padding:1rem}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
  .form-group{display:flex;flex-direction:column;gap:.2rem}
  .form-group.full{grid-column:1/-1}
  label{font-size:.6rem;color:gray}
  input,select,textarea{background:#1a1a1a;border:1px solid var(--border);color:var(--text);padding:.4rem;border-radius:6px}
  .star-rating{display:flex;gap:.2rem}
  .star-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;color:gray}
  .star-btn.active{color:var(--gold)}
  .modal-footer{display:flex;justify-content:flex-end;gap:.5rem;margin-top:1rem;padding-top:.5rem;border-top:1px solid var(--border)}
  .tmdb-dropdown{position:absolute;top:100%;left:0;right:0;background:#1a1a1a;border:1px solid var(--border);max-height:200px;overflow-y:auto;display:none;z-index:50}
  .tmdb-item{display:flex;gap:.5rem;padding:.5rem;cursor:pointer;border-bottom:1px solid var(--border)}
  .tmdb-thumb{width:32px;height:48px;object-fit:cover}
  .detail-poster{width:70px;height:105px;object-fit:cover;border-radius:6px}
  .detail-row{display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border)}
  .toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:#000;border:1px solid var(--gold);padding:.4rem .8rem;border-radius:20px;font-size:.7rem;opacity:0;transition:.2s}
  .toast.show{opacity:1}
  .empty{text-align:center;padding:2rem;color:gray}
  .fab-container{position:fixed;bottom:1rem;right:1rem;display:flex;flex-direction:column;gap:.5rem;z-index:150}
  .fab{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .fab-add{background:var(--gold);color:#000;font-size:1.5rem;border:none}
  .fab-filter{background:var(--surface);border:1px solid var(--border);color:gray}
  @media(max-width:700px){main{grid-template-columns:1fr}aside{display:none}.stats-bar .stat-value{font-size:1rem}.stat-item{padding:.4rem}.logo{font-size:1.1rem}}
</style>
</head>
<body>

<div class="sync-bar">
  <span class="sync-dot" id="sync-dot"></span>
  <span id="sync-status">Ready</span>
</div>

<header>
  <div class="logo">MangaTrack</div>
  <div>
    <button class="btn" onclick="exportData()">Export</button>
    <button class="btn" onclick="triggerImport()">Import</button>
    <button class="btn" onclick="loadFromSheets()">Sync</button>
    <button class="btn btn-primary" onclick="openAddModal()">+ Add</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item" onclick="filterStatus('all')"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">0</div></div>
  <div class="stat-item" onclick="filterStatus('reading')"><div class="stat-label">Reading</div><div class="stat-value" id="stat-reading">0</div></div>
  <div class="stat-item" onclick="filterStatus('completed')"><div class="stat-label">Done</div><div class="stat-value" id="stat-completed">0</div></div>
  <div class="stat-item" onclick="filterStatus('plan')"><div class="stat-label">Plan</div><div class="stat-value" id="stat-plan">0</div></div>
</div>

<main>
  <aside>
    <div class="sidebar-title">STATUS</div>
    <div class="nav-item active" id="nav-all" onclick="filterStatus('all')"><span>All</span><span class="nav-count" id="cnt-all">0</span></div>
    <div class="nav-item" id="nav-reading" onclick="filterStatus('reading')"><span>Reading</span><span class="nav-count" id="cnt-reading">0</span></div>
    <div class="nav-item" id="nav-completed" onclick="filterStatus('completed')"><span>Completed</span><span class="nav-count" id="cnt-completed">0</span></div>
    <div class="nav-item" id="nav-plan" onclick="filterStatus('plan')"><span>Plan to Read</span><span class="nav-count" id="cnt-plan">0</span></div>
    <div class="nav-item" id="nav-dropped" onclick="filterStatus('dropped')"><span>Dropped</span><span class="nav-count" id="cnt-dropped">0</span></div>
    <div class="sidebar-title">TYPE</div>
    <div class="nav-item" id="nav-type-all" onclick="filterType('all')"><span>All Types</span></div>
    <div class="nav-item" id="nav-type-manga" onclick="filterType('Manga')"><span>Manga</span><span class="nav-count" id="cnt-manga">0</span></div>
    <div class="nav-item" id="nav-type-manhwa" onclick="filterType('Manhwa')"><span>Manhwa</span><span class="nav-count" id="cnt-manhwa">0</span></div>
    <div class="nav-item" id="nav-type-manhua" onclick="filterType('Manhua')"><span>Manhua</span><span class="nav-count" id="cnt-manhua">0</span></div>
    <div class="sidebar-title">GENRES</div>
    <div id="genre-cloud"></div>
  </aside>

  <div class="content">
    <div class="section-title" id="section-title">My Collection</div>
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Search..." id="search-input" oninput="renderMedia()">
      </div>
      <select id="sort-select" onchange="renderMedia()">
        <option value="added">Recent</option>
        <option value="rating">Rating</option>
        <option value="title">A-Z</option>
      </select>
    </div>
    <div id="media-container"></div>
  </div>
</main>

<div class="fab-container">
  <button class="fab fab-filter" onclick="toggleSidebar()">⊟</button>
  <button class="fab fab-add" onclick="openAddModal()">+</button>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="modal-heading">Add Manga</div><button onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div><label>Search from MyAnimeList</label><div><input id="jikan-search" type="text" placeholder="Type title..." oninput="onJikanSearch(this.value)"><div id="jikan-dd" class="tmdb-dropdown"></div></div></div>
      <div><label>Title</label><input id="f-title"></div>
      <div class="form-grid">
        <div><label>Type</label><select id="f-type"><option>Manga</option><option>Manhwa</option><option>Manhua</option></select></div>
        <div><label>Year</label><input id="f-year" type="number"></div>
        <div><label>Status</label><select id="f-status"><option value="plan">Plan to Read</option><option value="reading">Reading</option><option value="completed">Completed</option><option value="dropped">Dropped</option></select></div>
        <div><label>Author</label><input id="f-author"></div>
        <div><label>Genres</label><input id="f-genre"></div>
        <div><label>Total Chapters</label><input id="f-chapters" type="number"></div>
        <div><label>Current Chapter</label><input id="f-current-chapter" type="number"></div>
        <div><label>URL</label><input id="f-url" type="url"></div>
        <div class="full"><label>Rating</label><div id="star-rating"><button class="star-btn" data-v="1" onclick="setRating(1)">★</button><button class="star-btn" data-v="2" onclick="setRating(2)">★</button><button class="star-btn" data-v="3" onclick="setRating(3)">★</button><button class="star-btn" data-v="4" onclick="setRating(4)">★</button><button class="star-btn" data-v="5" onclick="setRating(5)">★</button></div></div>
        <div class="full"><label>Notes</label><textarea id="f-notes" rows="2"></textarea></div>
      </div>
      <input type="hidden" id="f-cover">
      <div class="modal-footer"><button onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="saveEntry()">Save</button></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="detail-overlay" onclick="closeDetailOutside(event)">
  <div class="modal">
    <div class="modal-header"><div style="display:flex;gap:.5rem;flex:1"><div id="d-poster"></div><div><div class="modal-title" id="d-title"></div><div id="d-meta" style="font-size:.7rem;color:gray"></div></div></div><button onclick="closeDetail()">✕</button></div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER_URL = 'https://manga-proxy.ahmaddani287362.workers.dev';
const JIKAN_API = 'https://api.jikan.moe/v4/manga?q=';

let mangaList = [];
let currentRating = 0;
let editId = null;
let statusFilter = 'all';
let typeFilter = 'all';
let genreFilter = 'all';
let viewMode = 'grid';
let searchTimer = null;

function escapeText(str) {
  if (!str) return '';
  return String(str).replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

async function loadFromSheets() {
  document.getElementById('sync-dot').className = 'sync-dot syncing';
  document.getElementById('sync-status').textContent = 'Loading...';
  try {
    const res = await fetch(WORKER_URL);
    const data = await res.json();
    mangaList = (data.manga || []).map(m => ({
      id: Number(m.id), title: m.title || '', type: m.type || 'Manga', year: Number(m.year) || 0,
      status: m.status || 'plan', genre: m.genre || '', author: m.author || '',
      chapters: Number(m.chapters) || 0, current: Number(m.currentChapter) || 0,
      rating: Number(m.rating) || 0, notes: m.notes || '', added: Number(m.added) || Date.now(),
      cover: m.cover || '', url: m.url || ''
    }));
    localStorage.setItem('manga', JSON.stringify(mangaList));
    document.getElementById('sync-dot').className = 'sync-dot online';
    document.getElementById('sync-status').textContent = 'Synced';
    renderMedia();
    setTimeout(() => { if (document.getElementById('sync-status').textContent === 'Synced') document.getElementById('sync-status').textContent = 'Ready'; }, 1500);
  } catch(e) {
    document.getElementById('sync-dot').className = 'sync-dot error';
    document.getElementById('sync-status').textContent = 'Error';
    const saved = localStorage.getItem('manga');
    if (saved) mangaList = JSON.parse(saved);
    renderMedia();
  }
}

async function saveToSheets(entry) {
  await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'save', manga: entry }) });
}

function exportData() {
  const data = JSON.stringify({ version: '1.0', exported: new Date().toISOString(), total: mangaList.length, manga: mangaList }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'manga-backup.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function triggerImport() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        let newList = imported.manga || (Array.isArray(imported) ? imported : []);
        if (!confirm(`Import ${newList.length} items? This will replace all data.`)) return;
        for (let m of newList) {
          await saveToSheets({
            id: m.id || Date.now(), title: m.title || '', type: m.type || 'Manga', year: m.year || 2024,
            status: m.status || 'plan', genre: m.genre || '', author: m.author || '',
            chapters: m.chapters || 0, currentChapter: m.currentChapter || 0, rating: m.rating || 0,
            notes: m.notes || '', cover: m.cover || '', url: m.url || '', added: m.added || Date.now()
          });
        }
        await loadFromSheets();
      } catch(e) { alert('Import failed'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

async function searchJikan(q) {
  try {
    const res = await fetch(JIKAN_API + encodeURIComponent(q) + '&limit=6');
    const data = await res.json();
    if (!data.data) return [];
    return data.data.map(m => ({
      id: m.mal_id,
      title: m.title_english || m.title || 'Unknown',
      cover: m.images?.jpg?.large_image_url || '',
      year: m.published?.prop?.from?.year || '',
      chapters: m.chapters || '',
      genres: (m.genres || []).map(g => g.name).join(', '),
      author: (m.authors || [])[0]?.name || ''
    }));
  } catch(e) { return []; }
}

function onJikanSearch(val) {
  clearTimeout(searchTimer);
  if (val.length < 2) { document.getElementById('jikan-dd').style.display = 'none'; return; }
  const dd = document.getElementById('jikan-dd');
  dd.innerHTML = '<div style="padding:.5rem">Searching...</div>';
  dd.style.display = 'block';
  searchTimer = setTimeout(async () => {
    const results = await searchJikan(val);
    if (!results.length) { dd.innerHTML = '<div style="padding:.5rem">No results</div>'; return; }
    dd.innerHTML = results.map(m => `
      <div class="tmdb-item" onclick="selectManga(this)" data-title="${m.title}" data-cover="${m.cover}" data-year="${m.year}" data-chapters="${m.chapters}" data-genres="${m.genres}" data-author="${m.author}">
        ${m.cover ? `<img class="tmdb-thumb" src="${m.cover}">` : '<div style="width:32px;height:48px;background:#333"></div>'}
        <div><div>${m.title}</div><div style="font-size:.6rem;color:gray">${m.genres.substring(0,30)}</div></div>
      </div>
    `).join('');
  }, 400);
}

function selectManga(el) {
  document.getElementById('f-title').value = el.dataset.title;
  document.getElementById('f-year').value = el.dataset.year;
  document.getElementById('f-chapters').value = el.dataset.chapters;
  document.getElementById('f-genre').value = el.dataset.genres;
  document.getElementById('f-author').value = el.dataset.author;
  document.getElementById('f-cover').value = el.dataset.cover;
  document.getElementById('jikan-search').value = el.dataset.title;
  document.getElementById('jikan-dd').style.display = 'none';
}

async function saveEntry() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Enter title'); return; }
  const entry = {
    id: editId || Date.now(),
    title: title,
    type: document.getElementById('f-type').value,
    year: parseInt(document.getElementById('f-year').value) || 2024,
    status: document.getElementById('f-status').value,
    genre: document.getElementById('f-genre').value || '',
    author: document.getElementById('f-author').value || '',
    chapters: parseInt(document.getElementById('f-chapters').value) || 0,
    currentChapter: parseInt(document.getElementById('f-current-chapter').value) || 0,
    rating: currentRating,
    notes: document.getElementById('f-notes').value || '',
    cover: document.getElementById('f-cover').value || '',
    url: document.getElementById('f-url').value || '',
    added: editId ? (mangaList.find(x=>x.id===editId)?.added || Date.now()) : Date.now()
  };
  try {
    await saveToSheets(entry);
    if (editId) { let i = mangaList.findIndex(x=>x.id===editId); if(i>-1) mangaList[i]=entry; }
    else mangaList.push(entry);
    localStorage.setItem('manga', JSON.stringify(mangaList));
    renderMedia();
    closeModal();
  } catch(e) { alert('Save failed'); }
}

function getFiltered() {
  let data = [...mangaList];
  if (statusFilter !== 'all') data = data.filter(x => x.status === statusFilter);
  if (typeFilter !== 'all') data = data.filter(x => x.type === typeFilter);
  if (genreFilter !== 'all') data = data.filter(x => x.genre && x.genre.toLowerCase().includes(genreFilter.toLowerCase()));
  const q = document.getElementById('search-input').value.toLowerCase();
  if (q) data = data.filter(x => x.title.toLowerCase().includes(q) || (x.author && x.author.toLowerCase().includes(q)));
  const sort = document.getElementById('sort-select').value;
  if (sort === 'rating') data.sort((a,b) => b.rating - a.rating);
  else if (sort === 'title') data.sort((a,b) => a.title.localeCompare(b.title));
  else data.sort((a,b) => b.added - a.added);
  return data;
}

function renderStars(r) { return [1,2,3,4,5].map(i => `<span class="star${i<=r?' filled':''}">★</span>`).join(''); }
function statusClass(s) { return {reading:'reading',completed:'completed',plan:'plan',dropped:'dropped'}[s] || 'plan'; }
function statusIcon(s) { return {reading:'📖',completed:'✅',plan:'📋',dropped:'⛔'}[s] || '📚'; }

function cardHTML(m) {
  const progress = m.chapters ? Math.round((m.current / m.chapters) * 100) : 0;
  const typeIcon = {Manga:'📘',Manhwa:'📱',Manhua:'📙'}[m.type] || '📘';
  return `<div class="media-card" onclick="showDetail(${m.id})">
    ${m.cover ? `<img class="card-poster" src="${m.cover}" onerror="this.style.display='none';">` : ''}
    <div class="poster-placeholder" style="${m.cover ? 'display:none' : 'display:flex'}">${m.title.charAt(0)}</div>
    <div class="status-badge ${statusClass(m.status)}">${statusIcon(m.status)}</div>
    <div class="card-info">
      <div class="card-title">${escapeText(m.title)}</div>
      <div class="card-meta">${typeIcon} ${m.type} · ${m.year}</div>
      <div class="card-meta">${m.current}/${m.chapters || '?'}</div>
      ${m.rating ? `<div class="star-row">${renderStars(m.rating)}</div>` : ''}
      ${progress>0 && progress<100 ? `<div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>` : ''}
    </div>
  </div>`;
}

function listHTML(m) {
  const typeIcon = {Manga:'📘',Manhwa:'📱',Manhua:'📙'}[m.type] || '📘';
  return `<div class="list-item" style="display:flex;gap:.5rem;padding:.5rem;background:var(--surface);border-radius:8px;margin-bottom:.3rem;cursor:pointer" onclick="showDetail(${m.id})">
    <div style="width:40px;height:60px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;border-radius:4px">${m.title.charAt(0)}</div>
    <div style="flex:1"><div>${escapeText(m.title)}</div><div style="font-size:.6rem;color:gray">${typeIcon} ${m.type} · Ch ${m.current}/${m.chapters || '?'}</div></div>
    <div class="status-badge ${statusClass(m.status)}" style="position:static;padding:.2rem .4rem">${statusIcon(m.status)}</div>
  </div>`;
}

function renderMedia() {
  updateStats();
  updateGenres();
  updateFilterUI();
  const data = getFiltered();
  const c = document.getElementById('media-container');
  if (!data.length) { c.innerHTML = '<div class="empty">No manga found</div>'; return; }
  c.innerHTML = viewMode === 'grid' ? `<div class="media-grid">${data.map(cardHTML).join('')}</div>` : `<div class="media-list">${data.map(listHTML).join('')}</div>`;
}

function updateStats() {
  document.getElementById('stat-total').textContent = mangaList.length;
  document.getElementById('stat-reading').textContent = mangaList.filter(x=>x.status==='reading').length;
  document.getElementById('stat-completed').textContent = mangaList.filter(x=>x.status==='completed').length;
  document.getElementById('stat-plan').textContent = mangaList.filter(x=>x.status==='plan').length;
  document.getElementById('cnt-all').textContent = mangaList.length;
  document.getElementById('cnt-reading').textContent = mangaList.filter(x=>x.status==='reading').length;
  document.getElementById('cnt-completed').textContent = mangaList.filter(x=>x.status==='completed').length;
  document.getElementById('cnt-plan').textContent = mangaList.filter(x=>x.status==='plan').length;
  document.getElementById('cnt-dropped').textContent = mangaList.filter(x=>x.status==='dropped').length;
  document.getElementById('cnt-manga').textContent = mangaList.filter(x=>x.type==='Manga').length;
  document.getElementById('cnt-manhwa').textContent = mangaList.filter(x=>x.type==='Manhwa').length;
  document.getElementById('cnt-manhua').textContent = mangaList.filter(x=>x.type==='Manhua').length;
}

function updateGenres() {
  const genres = new Set();
  mangaList.forEach(m => { if(m.genre) m.genre.split(',').forEach(g => genres.add(g.trim())); });
  const cloud = document.getElementById('genre-cloud');
  cloud.innerHTML = [...genres].sort().map(g => `<button class="genre-tag ${genreFilter===g?'active':''}" onclick="filterGenre('${g}')">${g}</button>`).join('');
}

function updateFilterUI() {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + statusFilter)?.classList.add('active');
  if (typeFilter === 'all') document.getElementById('nav-type-all')?.classList.add('active');
  else if (typeFilter === 'Manga') document.getElementById('nav-type-manga')?.classList.add('active');
  else if (typeFilter === 'Manhwa') document.getElementById('nav-type-manhwa')?.classList.add('active');
  else if (typeFilter === 'Manhua') document.getElementById('nav-type-manhua')?.classList.add('active');
  let title = 'My ';
  if (statusFilter !== 'all') title += statusFilter === 'reading' ? 'Reading ' : statusFilter === 'completed' ? 'Completed ' : statusFilter === 'plan' ? 'Plan ' : 'Dropped ';
  else title += 'All ';
  if (typeFilter !== 'all') title += '· ' + typeFilter + ' ';
  if (genreFilter !== 'all') title += '· ' + genreFilter;
  else title += 'Collection';
  document.getElementById('section-title').innerHTML = title;
}

function filterStatus(s) { statusFilter = s; renderMedia(); }
function filterType(t) { typeFilter = t; renderMedia(); }
function filterGenre(g) { genreFilter = genreFilter === g ? 'all' : g; renderMedia(); }
function setView(v) { viewMode = v; renderMedia(); }
function setRating(v) { currentRating = v; document.querySelectorAll('.star-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.v) <= v)); }

function openAddModal() {
  editId = null;
  currentRating = 0;
  document.getElementById('modal-heading').textContent = 'Add Manga';
  document.getElementById('f-title').value = '';
  document.getElementById('f-type').value = 'Manga';
  document.getElementById('f-year').value = '';
  document.getElementById('f-status').value = 'plan';
  document.getElementById('f-genre').value = '';
  document.getElementById('f-author').value = '';
  document.getElementById('f-chapters').value = '';
  document.getElementById('f-current-chapter').value = '';
  document.getElementById('f-url').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('f-cover').value = '';
  document.getElementById('jikan-search').value = '';
  setRating(0);
  document.getElementById('modal-overlay').classList.add('open');
}

function openEditModal(id) {
  editId = id;
  const m = mangaList.find(x => x.id === id);
  if (!m) return;
  document.getElementById('modal-heading').textContent = 'Edit Manga';
  document.getElementById('f-title').value = m.title;
  document.getElementById('f-type').value = m.type;
  document.getElementById('f-year').value = m.year;
  document.getElementById('f-status').value = m.status;
  document.getElementById('f-genre').value = m.genre;
  document.getElementById('f-author').value = m.author;
  document.getElementById('f-chapters').value = m.chapters;
  document.getElementById('f-current-chapter').value = m.current;
  document.getElementById('f-url').value = m.url || '';
  document.getElementById('f-notes').value = m.notes;
  document.getElementById('f-cover').value = m.cover;
  setRating(m.rating);
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); editId = null; }
function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

async function updateChapter(id) {
  const input = document.getElementById('quick-input');
  const newChapter = parseInt(input.value) || 0;
  const manga = mangaList.find(x => x.id === id);
  if (!manga) return;
  const updated = { ...manga, current: newChapter };
  const idx = mangaList.findIndex(x => x.id === id);
  if (idx !== -1) mangaList[idx] = updated;
  try {
    await saveToSheets(updated);
    localStorage.setItem('manga', JSON.stringify(mangaList));
    renderMedia();
    closeDetail();
    showDetail(id);
  } catch(e) { alert('Update failed'); }
}

function showDetail(id) {
  const m = mangaList.find(x => x.id === id);
  if (!m) return;
  const typeIcon = {Manga:'📘',Manhwa:'📱',Manhua:'📙'}[m.type] || '📘';
  const statusText = {reading:'Reading',completed:'Completed',plan:'Plan to Read',dropped:'Dropped'}[m.status] || m.status;
  const progress = m.chapters ? Math.round((m.current / m.chapters) * 100) : 0;
  document.getElementById('d-title').innerHTML = `${typeIcon} ${escapeText(m.title)}`;
  document.getElementById('d-meta').innerHTML = `${m.type} · ${m.year} ${m.author ? '· ' + escapeText(m.author) : ''}`;
  document.getElementById('d-poster').innerHTML = m.cover ? `<img class="detail-poster" src="${m.cover}">` : `<div class="detail-poster" style="background:#1a1a1a;display:flex;align-items:center;justify-content:center">${m.title.charAt(0)}</div>`;
  document.getElementById('detail-body').innerHTML = `
    <div>${m.rating ? `<div style="display:flex;gap:.5rem;align-items:center"><span style="font-size:1.2rem;color:var(--gold)">${m.rating}</span><div>${renderStars(m.rating)}</div></div>` : 'Not rated'}</div>
    <div style="background:#1a1a1a;border-radius:8px;padding:.5rem;margin:.5rem 0">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:.6rem">PROGRESS</div><div style="font-size:1rem;color:var(--gold)">${m.current} / ${m.chapters || '?'}</div></div>
        <div><input type="number" id="quick-input" value="${m.current}" style="width:70px;padding:.2rem"><button class="btn" onclick="updateChapter(${m.id})" style="padding:.2rem .5rem">Update</button></div>
      </div>
      ${progress>0 ? `<div class="progress-bar" style="margin-top:.3rem"><div class="progress-fill" style="width:${progress}%"></div></div>` : ''}
    </div>
    <div><div class="detail-row"><span>Status</span><span>${statusText}</span></div>${m.author ? `<div class="detail-row"><span>Author</span><span>${escapeText(m.author)}</span></div>` : ''}${m.genre ? `<div class="detail-row"><span>Genres</span><span>${escapeText(m.genre)}</span></div>` : ''}${m.chapters ? `<div class="detail-row"><span>Total</span><span>${m.chapters} ch</span></div>` : ''}${m.url ? `<div class="detail-row"><span>Link</span><span><a href="${m.url}" target="_blank" style="color:var(--gold)">Read Online →</a></span></div>` : ''}</div>
    ${m.notes ? `<div style="background:#1a1a1a;border-left:2px solid var(--gold);padding:.5rem;margin:.5rem 0">${escapeText(m.notes)}</div>` : ''}
    <div style="display:flex;gap:.5rem;margin-top:.5rem"><button class="btn btn-primary" onclick="closeDetail(); openEditModal(${m.id})">Edit</button><button class="btn" onclick="deleteEntry(${m.id})" style="border-color:var(--red);color:var(--red)">Delete</button></div>
  `;
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail() { document.getElementById('detail-overlay').classList.remove('open'); }
function closeDetailOutside(e) { if (e.target === document.getElementById('detail-overlay')) closeDetail(); }

async function deleteEntry(id) {
  if (!confirm('Remove?')) return;
  try {
    await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'delete', id: id }) });
    mangaList = mangaList.filter(x => x.id !== id);
    localStorage.setItem('manga', JSON.stringify(mangaList));
    renderMedia();
    closeDetail();
  } catch(e) { alert('Delete failed'); }
}

function toggleSidebar() {
  const aside = document.querySelector('aside');
  aside.style.display = aside.style.display === 'none' ? 'block' : 'none';
}
window.addEventListener('resize', () => { if (window.innerWidth > 700) document.querySelector('aside').style.display = 'block'; });
document.addEventListener('click', e => { if (!e.target.closest('.tmdb-wrap') && !e.target.closest('#jikan-search')) document.getElementById('jikan-dd').style.display = 'none'; });

loadFromSheets();
</script>
</body>
</html>
